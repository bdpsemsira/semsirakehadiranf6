<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetapan Sistem - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        /* ... 保持原有样式 ... */
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Poppins', sans-serif; }
        header { background: #1e293b; padding: 15px; text-align: center; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        h3 { color: #38bdf8; margin-top: 0; }
        .setting-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-size: 14px; color: #94a3b8; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; border: 1px solid #334155; color: white; }
        
        /* 新增：开关样式 (Toggle Switch) */
        .switch-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.5);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #38bdf8; }
        input:checked + .slider:before { transform: translateX(24px); }

        .btn-save { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <a href="menu.html" style="float: left; text-decoration: none; color: white; position: absolute; left: 20px; font-size: 20px;">⬅️</a>
        <span style="font-weight: 600;">Tetapan Sistem</span>
    </header>

    <div class="container">
        <div class="card">
            <h3>📷 Tetapan Kamera</h3>
            <div class="setting-group">
                <label for="cameraSelect">Pilih Sumber Kamera</label>
                <select id="cameraSelect">
                    <option value="">Mengesan kamera...</option>
                </select>
            </div>
            
            <div class="setting-group">
                <label>Mirror View (Pantulan Imej)</label>
                <div class="switch-container">
                    <span style="font-size: 14px;">Aktifkan Mirroring</span>
                    <label class="switch">
                        <input type="checkbox" id="mirrorToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>⏰ Had Masa Lewat</h3>
            <div class="setting-group">
                <label>Masa Mula Lewat (HH:mm)</label>
                <input type="time" id="lateTime" value="07:35">
            </div>
            <button class="btn-save" onclick="saveSettings()">💾 SIMPAN TETAPAN</button>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        async function getCameras() {
            const cameraSelect = document.getElementById('cameraSelect');
            try {
                const devices = await Html5Qrcode.getCameras();
                cameraSelect.innerHTML = '';
                if (devices && devices.length) {
                    devices.forEach(device => {
                        const option = document.createElement('option');
                        option.value = device.id;
                        option.text = device.label || `Kamera ${cameraSelect.length + 1}`;
                        cameraSelect.appendChild(option);
                    });
                    const savedCamera = localStorage.getItem('preferredCameraId');
                    if (savedCamera) cameraSelect.value = savedCamera;
                }
            } catch (err) { cameraSelect.innerHTML = '<option value="">Ralat Kamera</option>'; }
        }

        function saveSettings() {
            const cameraId = document.getElementById('cameraSelect').value;
            const lateTime = document.getElementById('lateTime').value;
            const isMirror = document.getElementById('mirrorToggle').checked;

            localStorage.setItem('preferredCameraId', cameraId);
            localStorage.setItem('lateTimeLimit', lateTime);
            localStorage.setItem('cameraMirror', isMirror); // 保存开关状态

            alert("Tetapan berjaya disimpan!");
        }

        window.onload = () => {
            getCameras();
            const savedTime = localStorage.getItem('lateTimeLimit');
            if (savedTime) document.getElementById('lateTime').value = savedTime;
            
            // 加载镜像开关状态
            const savedMirror = localStorage.getItem('cameraMirror') === 'true';
            document.getElementById('mirrorToggle').checked = savedMirror;
        };
    </script>
</body>
</html>
