<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Automatik - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        header {
            background: #1e293b;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 100;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0 10px;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 60px;
            right: 15px;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            width: 220px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
            padding: 10px;
        }

        .dropdown-menu.show { display: block; }

        .menu-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .menu-item label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 5px; }

        select {
            width: 100%;
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            padding: 8px;
            border-radius: 5px;
        }

        #reader {
            width: 100vw !important;
            height: 100vh !important;
            background: #000;
        }

        #reader video {
            object-fit: cover !important;
        }

        /* --- 核心修复：隐藏 html5-qrcode 自带的重叠框 --- */
        #reader__scan_region {
            display: none !important;
        }
        #reader__dashboard {
            background: transparent !important;
            color: white !important;
            padding: 10px !important;
        }

        /* 自定义智能追踪框 */
        .qr-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border: 2px solid rgba(56, 189, 248, 0.5);
            border-radius: 20px;
            pointer-events: none;
            z-index: 50;
        }

        .qr-overlay::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: #38bdf8;
            box-shadow: 0 0 15px #38bdf8;
            animation: scanAnim 2s infinite linear;
        }

        @keyframes scanAnim {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .result-card {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 400px;
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            display: none;
            z-index: 200;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            border-top: 4px solid #38bdf8;
        }

        /* 进度条样式修复 */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            margin-top: 15px;
            border-radius: 3px;
            overflow: hidden;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: #38bdf8;
            /* transition 将在 JS 中触发 */
        }

        .status-hadir { color: #10b981; font-weight: bold; }
        .status-lewat { color: #f43f5e; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="menu.html" style="text-decoration: none; color: white; font-size: 20px;">⬅️</a>
        <span style="font-weight: 600;">Scanner SEMSIRA</span>
        <button class="menu-btn" onclick="toggleMenu()">⋮</button>
        
        <div id="dropMenu" class="dropdown-menu">
            <div class="menu-item">
                <label>Pilih Kamera</label>
                <select id="camSelect" onchange="changeCamera(this.value)">
                    <option>Loading...</option>
                </select>
            </div>
            <div class="menu-item" style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 13px;">Mirror View</span>
                <input type="checkbox" id="mirrorCheck" onchange="toggleMirror(this.checked)">
            </div>
        </div>
    </header>

    <div id="reader"></div>
    <div class="qr-overlay"></div>

    <div id="result" class="result-card">
        <h3 id="res-name" style="margin:0; font-size: 1.2rem;">NAMA</h3>
        <p id="res-class" style="margin:5px 0; color: #38bdf8;">KELAS</p>
        <p style="margin:0; font-size: 14px;">Status: <span id="res-status">--</span></p>
        
        <div class="progress-container">
            <div id="progress"></div>
        </div>
        <p style="font-size: 10px; color: #64748b; text-align: center; margin-top: 5px;">Sedia dalam 3 saat...</p>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const html5QrCode = new Html5Qrcode("reader");
        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        window.toggleMenu = () => document.getElementById('dropMenu').classList.toggle('show');
        
        window.toggleMirror = (val) => {
            localStorage.setItem('cameraMirror', val);
            const video = document.querySelector('#reader video');
            if(video) video.style.transform = val ? "scaleX(-1)" : "scaleX(1)";
        };

        window.changeCamera = (id) => {
            localStorage.setItem('preferredCameraId', id);
            location.reload();
        };

        async function initScanner() {
            try {
                const devices = await Html5Qrcode.getCameras();
                const select = document.getElementById('camSelect');
                select.innerHTML = '';
                devices.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.text = d.label;
                    if(d.id === localStorage.getItem('preferredCameraId')) opt.selected = true;
                    select.appendChild(opt);
                });

                const isMirror = localStorage.getItem('cameraMirror') === 'true';
                document.getElementById('mirrorCheck').checked = isMirror;

                // 配置识别区域
                const config = { 
                    fps: 20, 
                    qrbox: { width: 250, height: 250 }, // 匹配 overlay 的尺寸
                    aspectRatio: 1.0
                };
                
                const savedId = localStorage.getItem('preferredCameraId');
                const cameraParam = savedId ? savedId : { facingMode: "environment" };

                html5QrCode.start(cameraParam, config, onScanSuccess)
                    .then(() => {
                        const video = document.querySelector('#reader video');
                        if(video) video.style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
                    })
                    .catch(() => {
                        html5QrCode.start({ facingMode: "user" }, config, onScanSuccess);
                    });
            } catch (e) { console.error(e); }
        }

        async function onScanSuccess(text) {
            await html5QrCode.stop();
            beep.play().catch(()=>{});

            try {
                const data = JSON.parse(text);
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
                
                const limit = localStorage.getItem('lateTimeLimit') || "07:35";
                const status = (timeStr > limit) ? "Lewat" : "Hadir";

                // 更新 UI
                document.getElementById('res-name').innerText = data.name;
                document.getElementById('res-class').innerText = data.kelas || data.class;
                document.getElementById('res-status').innerText = status.toUpperCase();
                document.getElementById('res-status').className = (status === "Hadir") ? "status-hadir" : "status-lewat";
                
                // 显示卡片并启动进度条
                const card = document.getElementById('result');
                const bar = document.getElementById('progress');
                
                card.style.display = "block";
                
                // --- 进度条逻辑修复 ---
                bar.style.transition = "none";
                bar.style.width = "100%";
                
                // 强制重绘
                void bar.offsetWidth;
                
                // 开始倒计时动画
                bar.style.transition = "width 3s linear";
                bar.style.width = "0%";

                // Firebase 记录
                const dateKey = now.toISOString().split('T')[0];
                await setDoc(doc(db, "attendance", `${dateKey}_${data.ic}`), {
                    ...data, time: timeStr, status: status, timestamp: serverTimestamp()
                });

                // 3秒后重启
                setTimeout(() => {
                    card.style.display = "none";
                    initScanner();
                }, 3000);

            } catch (e) {
                console.error("Format QR Salah");
                initScanner();
            }
        }

        window.onload = initScanner;
    </script>
</body>
</html>
