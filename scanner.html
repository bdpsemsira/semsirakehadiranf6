<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Automatik - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            background-color: #020617;
            color: #f1f5f9;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        header {
            background: #1e293b;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000; /* 确保在最上层 */
            height: 60px;
            box-sizing: border-box;
            position: relative;
        }

        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        .dropdown-menu {
            display: none; position: absolute; top: 60px; right: 15px;
            background: #1e293b; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; width: 220px; z-index: 2000; padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .dropdown-menu.show { display: block; }

        .scanner-container {
            position: relative;
            width: 100vw;
            height: calc(100vh - 60px); 
            background: #000;
            overflow: hidden;
        }

        /* --- 核心修复：强制清除库自带的所有边框和遮罩 --- */
        #reader { 
            width: 100% !important; 
            height: 100% !important; 
            border: none !important; 
        }

        /* 隐藏库自动生成的扫码框边缘、遮罩和提示文字 */
        #reader__scan_region, 
        #reader__scan_region > div,
        #reader__scan_region > img,
        #reader__dashboard,
        #reader__status_span { 
            border: none !important; 
            background: transparent !important; 
            box-shadow: none !important;
        }

        /* 彻底移除库自带的那个白色/灰色长方形框 */
        div[style*="border: 5px solid rgb(255, 255, 255)"],
        div[style*="border: 5px solid white"],
        #reader__scan_region svg {
            display: none !important;
        }

        #reader video { 
            object-fit: cover !important; 
            width: 100% !important;
            height: 100% !important;
        }

        /* --- 自定义蓝色正方形 --- */
        .qr-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border: 2px solid #38bdf8;
            border-radius: 30px;
            /* 创建深色外围遮罩 */
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.6); 
            z-index: 50;
            pointer-events: none;
        }

        .laser-line {
            position: absolute;
            top: 5%; left: 10%; width: 80%; height: 2px;
            background: #38bdf8;
            box-shadow: 0 0 15px #38bdf8;
            animation: scanAnim 2.5s infinite ease-in-out;
        }

        @keyframes scanAnim {
            0%, 100% { top: 10%; opacity: 0; }
            50% { top: 90%; opacity: 1; }
        }

        .result-card {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); width: 85%; max-width: 400px;
            background: #1e293b; border-radius: 20px; padding: 25px;
            display: none; z-index: 3000; border-top: 5px solid #38bdf8;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        .status-hadir { color: #10b981; font-weight: bold; }
        .status-lewat { color: #f43f5e; font-weight: bold; }
        
        .progress-bar {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            margin-top: 20px; border-radius: 10px; overflow: hidden;
        }
        #progress { width: 0%; height: 100%; background: #38bdf8; }
    </style>
</head>
<body>

    <header>
        <a href="menu.html" style="text-decoration: none; color: white; font-size: 20px;">⬅️</a>
        <span style="font-weight: 600;">Automated Attendance</span>
        <button class="menu-btn" onclick="toggleMenu()">⋮</button>
        
        <div id="dropMenu" class="dropdown-menu">
            <div style="padding: 10px;">
                <label style="font-size: 12px; color: #94a3b8;">Kamera</label>
                <select id="camSelect" onchange="changeCamera(this.value)" style="width:100%; background:#0f172a; color:white; border:1px solid #334155; padding:8px; border-radius:5px; margin-top:5px;"></select>
            </div>
            <div style="padding: 10px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 13px;">Mirror View</span>
                <input type="checkbox" id="mirrorCheck" onchange="toggleMirror(this.checked)">
            </div>
        </div>
    </header>

    <div class="scanner-container">
        <div id="reader"></div>
        <div class="qr-box">
            <div class="laser-line"></div>
        </div>
    </div>

    <div id="result" class="result-card">
        <h3 id="res-name" style="margin:0; text-transform: uppercase;">NAMA MURID</h3>
        <p id="res-class" style="margin:8px 0; color: #38bdf8; font-weight: 600;">KELAS</p>
        <p style="font-size: 14px;">Status: <span id="res-status">--</span></p>
        <div class="progress-bar"><div id="progress"></div></div>
    </div>

    <audio id="beepSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const html5QrCode = new Html5Qrcode("reader");
        const beep = document.getElementById('beepSound');

        window.toggleMenu = () => document.getElementById('dropMenu').classList.toggle('show');
        
        window.toggleMirror = (val) => {
            localStorage.setItem('cameraMirror', val);
            const video = document.querySelector('#reader video');
            if(video) video.style.transform = val ? "scaleX(-1)" : "scaleX(1)";
        };

        window.changeCamera = (id) => {
            localStorage.setItem('preferredCameraId', id);
            location.reload();
        };

        async function initScanner() {
            try {
                const devices = await Html5Qrcode.getCameras();
                const select = document.getElementById('camSelect');
                select.innerHTML = '';
                devices.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id; opt.text = d.label;
                    if(d.id === localStorage.getItem('preferredCameraId')) opt.selected = true;
                    select.appendChild(opt);
                });

                // 配置参数
                const config = { 
                    fps: 25, 
                    // 关键：将 qrbox 设为 undefined 或极小，然后用 CSS 彻底隐藏生成的元素
                    // 但由于我们要全屏识别，这里不设置 qrbox 往往效果更好
                    aspectRatio: 1.0
                };
                
                const isMirror = localStorage.getItem('cameraMirror') === 'true';
                document.getElementById('mirrorCheck').checked = isMirror;

                const savedId = localStorage.getItem('preferredCameraId');
                const cameraParam = savedId ? savedId : { facingMode: "environment" };

                html5QrCode.start(cameraParam, config, onScanSuccess)
                    .then(() => {
                        const video = document.querySelector('#reader video');
                        if(video) video.style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
                        
                        // 暴力清除：在启动后再次强制移除可能产生的内联边框
                        const scanRegion = document.getElementById('reader__scan_region');
                        if(scanRegion) {
                            scanRegion.style.border = "none";
                            // 寻找并隐藏库自动生成的 5px 白色边框层
                            const innerDivs = scanRegion.querySelectorAll('div');
                            innerDivs.forEach(div => {
                                if(div.style.border.includes('5px')) div.style.display = 'none';
                            });
                        }
                    });
            } catch (e) { console.error(e); }
        }

        async function onScanSuccess(text) {
            await html5QrCode.stop();
            beep.play().catch(() => {});

            try {
                const data = JSON.parse(text);
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
                const limit = localStorage.getItem('lateTimeLimit') || "07:35";
                const status = (timeStr > limit) ? "Lewat" : "Hadir";

                document.getElementById('res-name').innerText = data.name;
                document.getElementById('res-class').innerText = data.kelas || data.class;
                document.getElementById('res-status').innerText = status.toUpperCase();
                document.getElementById('res-status').className = (status === "Hadir") ? "status-hadir" : "status-lewat";
                
                const card = document.getElementById('result');
                const bar = document.getElementById('progress');
                
                card.style.display = "block";
                bar.style.transition = "none";
                bar.style.width = "100%";
                void bar.offsetWidth;
                bar.style.transition = "width 3s linear";
                bar.style.width = "0%";

                const dateKey = now.toISOString().split('T')[0];
                await setDoc(doc(db, "attendance", `${dateKey}_${data.ic}`), {
                    ...data, time: timeStr, status: status, timestamp: serverTimestamp()
                });

                setTimeout(() => {
                    card.style.display = "none";
                    initScanner();
                }, 3000);
            } catch (e) {
                initScanner();
            }
        }
        window.onload = initScanner;
    </script>
</body>
</html>
