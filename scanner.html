<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Automatik - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f1f5f9;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: #1e293b;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            margin-bottom: 15px;
        }

        /* --- 核心修复：防止裁切 --- */
        #reader {
            width: 100% !important;
            background: #000;
            border: none !important;
        }

        #reader video {
            /* 改为 contain 确保画面完整显示，不漏掉任何角落 */
            object-fit: contain !important; 
            width: 100% !important;
            height: auto !important;
        }

        /* 结果显示卡片 */
        .result-card {
            display: none;
            padding: 25px;
            border-left: 6px solid #38bdf8;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #res-name { color: #ffffff; margin: 0; font-size: 1.4rem; text-transform: uppercase; }
        #res-class { color: #38bdf8; margin: 5px 0 15px 0; font-size: 1rem; font-weight: 600; }

        .status-hadir { color: #10b981; font-weight: 800; padding: 8px 16px; background: rgba(16, 185, 129, 0.15); border-radius: 10px; display: inline-block; }
        .status-lewat { color: #f43f5e; font-weight: 800; padding: 8px 16px; background: rgba(244, 63, 94, 0.15); border-radius: 10px; display: inline-block; }

        .timer-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); margin-top: 20px; border-radius: 2px; position: relative; overflow: hidden; }
        .timer-progress { position: absolute; left: 0; top: 0; height: 100%; background: #38bdf8; width: 100%; transition: width 3s linear; }

        /* 扫描框动画效果 */
        #reader__scan_region::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; height: 70%;
            border: 2px solid #38bdf8;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <header>
        <a href="menu.html" style="float: left; text-decoration: none; color: white; position: absolute; left: 20px; font-size: 20px;">⬅️</a>
        <span style="font-weight: 600;">Scanner SEMSIRA</span>
    </header>

    <div class="container">
        <div class="card" style="padding: 10px;">
            <div id="reader"></div>
        </div>

        <div id="result" class="card result-card">
            <h3 id="res-name">NAMA MURID</h3>
            <p id="res-class">KELAS</p>
            <div style="font-size: 15px; color: #cbd5e1;">
                <p>🕒 Masa: <span id="res-time" style="font-weight: 600; color: #fff;">--:--</span></p>
                <p style="margin-top: 10px;">📌 Status: <span id="res-status">--</span></p>
            </div>
            <div class="timer-bar"><div id="progress" class="timer-progress"></div></div>
            <p style="font-size: 11px; color: #64748b; margin-top: 8px; text-align: center;">Sedia dalam 3 saat...</p>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        const html5QrCode = new Html5Qrcode("reader");

        // --- 核心修复：动态 qrbox 大小 ---
        const qrConfig = { 
            fps: 25, 
            qrbox: (viewfinderWidth, viewfinderHeight) => {
                // 自动根据画面大小设置扫描区为宽度的 70%，增加边缘容错率
                let size = Math.min(viewfinderWidth, viewfinderHeight) * 0.7;
                return { width: size, height: size };
            }
        };

        startScanner();

        async function startScanner() {
            const savedCameraId = localStorage.getItem('preferredCameraId');
            const isMirror = localStorage.getItem('cameraMirror') === 'true';
            
            const cameraMode = savedCameraId ? { deviceId: { exact: savedCameraId } } : { facingMode: "environment" };

            html5QrCode.start(cameraMode, qrConfig, onScanSuccess)
                .then(() => {
                    const videoElem = document.querySelector('#reader video');
                    if (videoElem) {
                        // 应用设置中的镜像翻转
                        videoElem.style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
                        videoElem.style.webkitTransform = isMirror ? "scaleX(-1)" : "scaleX(1)";
                    }
                })
                .catch(err => {
                    console.error("Camera error:", err);
                    html5QrCode.start({ facingMode: "environment" }, qrConfig, onScanSuccess);
                });
        }

        async function onScanSuccess(decodedText) {
            await html5QrCode.stop();
            beep.play().catch(() => {});

            try {
                const student = JSON.parse(decodedText);
                const now = new Date();
                const currentTime = now.getHours().toString().padStart(2, '0') + ":" + 
                                    now.getMinutes().toString().padStart(2, '0');
                
                const savedLateTime = localStorage.getItem('lateTimeLimit') || "07:35";
                const [limitHour, limitMin] = savedLateTime.split(':').map(Number);
                
                let status = (now.getHours() > limitHour || (now.getHours() === limitHour && now.getMinutes() > limitMin)) ? "Lewat" : "Hadir";

                document.getElementById('res-name').innerText = student.name;
                document.getElementById('res-class').innerText = student.kelas || student.class;
                document.getElementById('res-time').innerText = currentTime;
                document.getElementById('res-status').innerText = status.toUpperCase();
                document.getElementById('res-status').className = status === "Hadir" ? "status-hadir" : "status-lewat";
                
                document.getElementById('result').style.display = "block";
                document.getElementById('progress').style.width = "100%";

                const dateKey = now.toISOString().split('T')[0];
                await setDoc(doc(db, "attendance", `${dateKey}_${student.ic}`), {
                    name: student.name,
                    ic: student.ic,
                    class: student.kelas || student.class,
                    time: currentTime,
                    status: status,
                    timestamp: serverTimestamp()
                });

                setTimeout(() => { document.getElementById('progress').style.width = "0%"; }, 50);
                setTimeout(() => {
                    document.getElementById('result').style.display = "none";
                    startScanner(); 
                }, 3000);

            } catch (e) {
                console.error("Parse error:", e);
                setTimeout(startScanner, 2000);
            }
        }
    </script>
</body>
</html>
