<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Automatik - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .container {
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 模拟 Google Meet 的选择器样式 */
        .camera-selector-container {
            background: #1e293b;
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: #0f172a;
            color: #38bdf8;
            border: 1px solid #334155;
            font-size: 14px;
            outline: none;
        }

        .card {
            background: #1e293b;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #reader {
            width: 100% !important;
            background: #000;
        }

        #reader video {
            object-fit: contain !important;
        }

        .result-card {
            display: none;
            padding: 20px;
            border-left: 6px solid #38bdf8;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-hadir { color: #10b981; font-weight: bold; }
        .status-lewat { color: #f43f5e; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <a href="menu.html" style="text-decoration: none; color: white; position: absolute; left: 20px; font-size: 20px;">⬅️</a>
        <span style="font-weight: 600;">Scanner Pro</span>
    </header>

    <div class="container">
        <div class="camera-selector-container">
            <label style="font-size: 12px; color: #94a3b8; display: block; margin-bottom: 5px;">🎥 Pilih Kamera (Tukar Sini)</label>
            <select id="cameraSelect">
                <option value="">Mengesan Kamera...</option>
            </select>
        </div>

        <div class="card">
            <div id="reader"></div>
        </div>

        <div id="result" class="card result-card">
            <h3 id="res-name" style="margin:0;">NAMA MURID</h3>
            <p id="res-class" style="color:#38bdf8; margin:5px 0;">KELAS</p>
            <p>🕒 Masa: <span id="res-time">--:--</span></p>
            <p>📌 Status: <span id="res-status">--</span></p>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const html5QrCode = new Html5Qrcode("reader");
        const cameraSelect = document.getElementById('cameraSelect');
        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        // 初始化相机列表
        async function initCameraList() {
            try {
                const devices = await Html5Qrcode.getCameras();
                cameraSelect.innerHTML = ''; // 清空
                
                if (devices && devices.length > 0) {
                    devices.forEach(device => {
                        const option = document.createElement('option');
                        option.value = device.id;
                        option.text = device.label || `Camera ${cameraSelect.length + 1}`;
                        cameraSelect.appendChild(option);
                    });

                    // 默认启动第一个（或之前存过的）
                    const lastUsed = localStorage.getItem('preferredCameraId');
                    if (lastUsed && devices.some(d => d.id === lastUsed)) {
                        cameraSelect.value = lastUsed;
                    }
                    
                    startScanner(cameraSelect.value);
                }
            } catch (err) {
                cameraSelect.innerHTML = '<option>Ralat Akses Kamera</option>';
            }
        }

        // 启动/切换相机函数
        async function startScanner(cameraId) {
            if (html5QrCode.getState() === 2) {
                await html5QrCode.stop();
            }

            const config = { 
                fps: 20, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0 
            };

            html5QrCode.start(cameraId, config, onScanSuccess)
                .catch(err => console.error("Gagal start:", err));
        }

        // 监听下拉菜单：用户一选，立刻切换
        cameraSelect.addEventListener('change', (e) => {
            const newId = e.target.value;
            localStorage.setItem('preferredCameraId', newId); // 顺便存一下，下次开还是这个
            startScanner(newId);
        });

        async function onScanSuccess(decodedText) {
            await html5QrCode.stop();
            beep.play();
            
            try {
                const student = JSON.parse(decodedText);
                const now = new Date();
                const currentTime = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
                
                // 判断逻辑
                const savedLateTime = localStorage.getItem('lateTimeLimit') || "07:35";
                const [lH, lM] = savedLateTime.split(':').map(Number);
                let status = (now.getHours() > lH || (now.getHours() === lH && now.getMinutes() > lM)) ? "Lewat" : "Hadir";

                // UI更新
                document.getElementById('res-name').innerText = student.name;
                document.getElementById('res-class').innerText = student.kelas || student.class;
                document.getElementById('res-time').innerText = currentTime;
                document.getElementById('res-status').innerText = status.toUpperCase();
                document.getElementById('res-status').className = status === "Hadir" ? "status-hadir" : "status-lewat";
                document.getElementById('result').style.display = "block";

                // 写入Firebase
                const dateKey = now.toISOString().split('T')[0];
                await setDoc(doc(db, "attendance", `${dateKey}_${student.ic}`), {
                    name: student.name,
                    ic: student.ic,
                    class: student.kelas || student.class,
                    time: currentTime,
                    status: status,
                    timestamp: serverTimestamp()
                });

                setTimeout(() => {
                    document.getElementById('result').style.display = "none";
                    startScanner(cameraSelect.value); 
                }, 3000);

            } catch (e) {
                startScanner(cameraSelect.value);
            }
        }

        // 运行初始化
        initCameraList();
    </script>
</body>
</html>
