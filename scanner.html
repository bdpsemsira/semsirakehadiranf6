<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Automatik - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            background-color: #020617;
            color: #f1f5f9;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        header {
            background: #1e293b;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            height: 60px;
            box-sizing: border-box;
        }

        .menu-btn {
            background: none; border: none; color: white;
            font-size: 24px; cursor: pointer;
        }

        .dropdown-menu {
            display: none; position: absolute; top: 60px; right: 15px;
            background: #1e293b; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; width: 220px; z-index: 1000; padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .dropdown-menu.show { display: block; }

        .scanner-container {
            position: relative;
            width: 100vw;
            height: 80vh; 
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #reader { width: 100% !important; height: 100% !important; border: none !important; }
        #reader video { object-fit: cover !important; }

        /* --- 彻底隐藏库自带的遮罩和白框 --- */
        #reader__scan_region { 
            border: none !important; 
            background: transparent !important; /* 关键：让自带遮罩变透明 */
            box-shadow: none !important;
        }
        /* 彻底移除库自带的四个角线条 */
        #reader__scan_region svg { 
            display: none !important; 
        } 
        #reader__dashboard { display: none !important; }

        /* --- 自定义蓝色正方形（这是唯一的视觉参考） --- */
        .qr-box {
            position: absolute;
            width: 260px;
            height: 260px;
            border: 2px solid #38bdf8;
            border-radius: 20px;
            /* 使用 box-shadow 创建外围深色遮罩 */
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.7); 
            z-index: 50;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 蓝色激光线 */
        .laser-line {
            position: absolute;
            top: 5%;
            left: 5%;
            width: 90%;
            height: 2px;
            background: #38bdf8;
            box-shadow: 0 0 12px #38bdf8;
            animation: scanAnim 2s infinite ease-in-out;
        }

        @keyframes scanAnim {
            0% { top: 5%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 95%; opacity: 0; }
        }

        .result-card {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); width: 90%; max-width: 450px;
            background: #1e293b; border-radius: 20px; padding: 20px;
            display: none; z-index: 200; border-top: 5px solid #38bdf8;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .progress-container {
            width: 100%; height: 5px; background: rgba(255,255,255,0.1);
            margin-top: 15px; border-radius: 10px; overflow: hidden;
        }
        #progress { width: 0%; height: 100%; background: #38bdf8; }

        .status-hadir { color: #10b981; font-weight: bold; }
        .status-lewat { color: #f43f5e; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="menu.html" style="text-decoration: none; color: white; font-size: 20px;">⬅️</a>
        <span style="font-weight: 600;">Automated Attendance</span>
        <button class="menu-btn" onclick="toggleMenu()">⋮</button>
        
        <div id="dropMenu" class="dropdown-menu">
            <div style="padding: 10px;">
                <label style="font-size: 12px; color: #94a3b8;">Kamera</label>
                <select id="camSelect" onchange="changeCamera(this.value)" style="width:100%; background:#0f172a; color:white; border:1px solid #334155; padding:8px; border-radius:5px;">
                </select>
            </div>
            <div style="padding: 10px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 13px;">Mirror View</span>
                <input type="checkbox" id="mirrorCheck" onchange="toggleMirror(this.checked)">
            </div>
        </div>
    </header>

    <div class="scanner-container">
        <div id="reader"></div>
        <div class="qr-box">
            <div class="laser-line"></div>
        </div>
    </div>

    <div id="result" class="result-card">
        <h3 id="res-name" style="margin:0;">NAMA MURID</h3>
        <p id="res-class" style="margin:5px 0; color: #38bdf8;">KELAS</p>
        <p>Status: <span id="res-status">--</span></p>
        <div class="progress-container"><div id="progress"></div></div>
    </div>

    <audio id="beepSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const html5QrCode = new Html5Qrcode("reader");
        const beep = document.getElementById('beepSound');

        // 解锁音频
        document.body.addEventListener('click', () => {
            beep.play().then(() => { beep.pause(); beep.currentTime = 0; }).catch(() => {});
        }, { once: true });

        window.toggleMenu = () => document.getElementById('dropMenu').classList.toggle('show');
        
        window.toggleMirror = (val) => {
            localStorage.setItem('cameraMirror', val);
            const video = document.querySelector('#reader video');
            if(video) video.style.transform = val ? "scaleX(-1)" : "scaleX(1)";
        };

        window.changeCamera = (id) => {
            localStorage.setItem('preferredCameraId', id);
            location.reload();
        };

        async function initScanner() {
            try {
                const devices = await Html5Qrcode.getCameras();
                const select = document.getElementById('camSelect');
                select.innerHTML = '';
                devices.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id; opt.text = d.label;
                    if(d.id === localStorage.getItem('preferredCameraId')) opt.selected = true;
                    select.appendChild(opt);
                });

                // 配置参数：确保逻辑扫码区域与蓝色框大小一致
                const config = { 
                    fps: 25, 
                    qrbox: { width: 260, height: 260 },
                    aspectRatio: 1.0
                };
                
                const isMirror = localStorage.getItem('cameraMirror') === 'true';
                document.getElementById('mirrorCheck').checked = isMirror;

                const savedId = localStorage.getItem('preferredCameraId');
                const cameraParam = savedId ? savedId : { facingMode: "environment" };

                html5QrCode.start(cameraParam, config, onScanSuccess)
                    .then(() => {
                        const video = document.querySelector('#reader video');
                        if(video) video.style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
                    });
            } catch (e) { console.error(e); }
        }

        async function onScanSuccess(text) {
            await html5QrCode.stop();
            beep.currentTime = 0;
            beep.play().catch(() => {});

            try {
                const data = JSON.parse(text);
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
                const limit = localStorage.getItem('lateTimeLimit') || "07:35";
                const status = (timeStr > limit) ? "Lewat" : "Hadir";

                document.getElementById('res-name').innerText = data.name;
                document.getElementById('res-class').innerText = data.kelas || data.class;
                document.getElementById('res-status').innerText = status.toUpperCase();
                document.getElementById('res-status').className = (status === "Hadir") ? "status-hadir" : "status-lewat";
                
                const card = document.getElementById('result');
                const bar = document.getElementById('progress');
                
                card.style.display = "block";
                bar.style.transition = "none";
                bar.style.width = "100%";
                void bar.offsetWidth;
                bar.style.transition = "width 3s linear";
                bar.style.width = "0%";

                const dateKey = now.toISOString().split('T')[0];
                await setDoc(doc(db, "attendance", `${dateKey}_${data.ic}`), {
                    ...data, time: timeStr, status: status, timestamp: serverTimestamp()
                });

                setTimeout(() => {
                    card.style.display = "none";
                    initScanner();
                }, 3000);
            } catch (e) {
                initScanner();
            }
        }
        window.onload = initScanner;
    </script>
</body>
</html>
