<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Automatik - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            background-color: #020617;
            color: #f1f5f9;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        header {
            background: #1e293b;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            height: 60px;
            box-sizing: border-box;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* 弹出小菜单 */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 60px;
            right: 15px;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            width: 220px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
            padding: 10px;
        }
        .dropdown-menu.show { display: block; }

        /* 扫描区域限制为 80% */
        .scanner-container {
            position: relative;
            width: 100vw;
            height: 80vh; 
            background: #000;
            overflow: hidden;
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
        }

        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
        }

        /* 隐藏库自带的扫描框 */
        #reader__scan_region, #reader__dashboard {
            display: none !important;
        }

        /* --- 智能红外激光线 --- */
        .laser-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(239, 68, 68, 0.8); /* 红色激光 */
            box-shadow: 0 0 15px 2px rgba(239, 68, 68, 0.6);
            z-index: 60;
            animation: infraredScan 3s infinite ease-in-out;
        }

        @keyframes infraredScan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* 结果卡片位置优化 */
        .result-card {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 450px;
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            display: none;
            z-index: 200;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.4);
            border-left: 5px solid #ef4444; /* 红色主题呼应激光 */
        }

        .progress-container {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.1);
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: #ef4444;
        }

        .status-hadir { color: #10b981; font-weight: bold; }
        .status-lewat { color: #f43f5e; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="menu.html" style="text-decoration: none; color: white; font-size: 20px;">⬅️</a>
        <span style="font-weight: 600;">Automated Attendance</span>
        <button class="menu-btn" onclick="toggleMenu()">⋮</button>
        
        <div id="dropMenu" class="dropdown-menu">
            <div style="padding: 10px;">
                <label style="font-size: 12px; color: #94a3b8;">Kamera</label>
                <select id="camSelect" onchange="changeCamera(this.value)" style="width:100%; background:#0f172a; color:white; border:1px solid #334155; padding:8px; border-radius:5px; margin-top:5px;">
                    <option>Detecting...</option>
                </select>
            </div>
            <div style="padding: 10px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05);">
                <span style="font-size: 13px;">Mirror View</span>
                <input type="checkbox" id="mirrorCheck" onchange="toggleMirror(this.checked)">
            </div>
        </div>
    </header>

    <div class="scanner-container">
        <div id="reader"></div>
        <div class="laser-line"></div>
    </div>

    <div id="result" class="result-card">
        <h3 id="res-name" style="margin:0; font-size: 1.2rem; color: #fff;">NAMA MURID</h3>
        <p id="res-class" style="margin:5px 0; color: #94a3b8;">KELAS</p>
        <p style="margin:0; font-size: 14px;">Status: <span id="res-status">--</span></p>
        
        <div class="progress-container">
            <div id="progress"></div>
        </div>
        <p style="font-size: 10px; color: #64748b; text-align: center; margin-top: 8px;">Success! Resetting in 3s...</p>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const html5QrCode = new Html5Qrcode("reader");
        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        window.toggleMenu = () => document.getElementById('dropMenu').classList.toggle('show');
        
        window.toggleMirror = (val) => {
            localStorage.setItem('cameraMirror', val);
            const video = document.querySelector('#reader video');
            if(video) video.style.transform = val ? "scaleX(-1)" : "scaleX(1)";
        };

        window.changeCamera = (id) => {
            localStorage.setItem('preferredCameraId', id);
            location.reload();
        };

        async function initScanner() {
            try {
                const devices = await Html5Qrcode.getCameras();
                const select = document.getElementById('camSelect');
                select.innerHTML = '';
                devices.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.text = d.label;
                    if(d.id === localStorage.getItem('preferredCameraId')) opt.selected = true;
                    select.appendChild(opt);
                });

                const isMirror = localStorage.getItem('cameraMirror') === 'true';
                document.getElementById('mirrorCheck').checked = isMirror;

                // 核心：虽然不画框，但我们要告诉引擎识别区域涵盖大部分视野
                const config = { 
                    fps: 25, 
                    qrbox: (viewWidth, viewHeight) => {
                        return { width: viewWidth * 0.8, height: viewHeight * 0.6 };
                    },
                    aspectRatio: 1.0
                };
                
                const savedId = localStorage.getItem('preferredCameraId');
                const cameraParam = savedId ? savedId : { facingMode: "environment" };

                html5QrCode.start(cameraParam, config, onScanSuccess)
                    .then(() => {
                        const video = document.querySelector('#reader video');
                        if(video) video.style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
                    })
                    .catch(() => {
                        html5QrCode.start({ facingMode: "user" }, config, onScanSuccess);
                    });
            } catch (e) { console.error(e); }
        }

        async function onScanSuccess(text) {
            await html5QrCode.stop();
            beep.play().catch(()=>{});

            try {
                const data = JSON.parse(text);
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
                
                const limit = localStorage.getItem('lateTimeLimit') || "07:35";
                const status = (timeStr > limit) ? "Lewat" : "Hadir";

                document.getElementById('res-name').innerText = data.name;
                document.getElementById('res-class').innerText = data.kelas || data.class;
                document.getElementById('res-status').innerText = status.toUpperCase();
                document.getElementById('res-status').className = (status === "Hadir") ? "status-hadir" : "status-lewat";
                
                const card = document.getElementById('result');
                const bar = document.getElementById('progress');
                
                card.style.display = "block";
                bar.style.transition = "none";
                bar.style.width = "100%";
                void bar.offsetWidth;
                bar.style.transition = "width 3s linear";
                bar.style.width = "0%";

                const dateKey = now.toISOString().split('T')[0];
                await setDoc(doc(db, "attendance", `${dateKey}_${data.ic}`), {
                    ...data, time: timeStr, status: status, timestamp: serverTimestamp()
                });

                setTimeout(() => {
                    card.style.display = "none";
                    initScanner();
                }, 3000);

            } catch (e) {
                console.error("Format Error");
                initScanner();
            }
        }

        window.onload = initScanner;
    </script>
</body>
</html>
