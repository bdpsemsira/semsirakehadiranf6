<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Automatik - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; margin: 0; font-family: 'Poppins', sans-serif; overflow: hidden; height: 100vh; }

        header {
            background: #1e293b; padding: 15px; display: flex; align-items: center; justify-content: space-between;
            z-index: 1000; height: 60px; box-sizing: border-box; position: relative;
        }

        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        .dropdown-menu {
            display: none; position: absolute; top: 60px; right: 15px;
            background: #1e293b; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; width: 220px; z-index: 2000; padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .dropdown-menu.show { display: block; }

        .scanner-container { position: relative; width: 100vw; height: calc(100vh - 60px); background: #000; overflow: hidden; }

        /* 隐藏库自带的 UI */
        #reader { width: 100% !important; height: 100% !important; border: none !important; }
        #reader__scan_region, #reader__scan_region > div, #reader__dashboard { border: none !important; background: transparent !important; box-shadow: none !important; }
        div[style*="border: 5px solid"], #reader__scan_region svg { display: none !important; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }

        /* 自定义扫描框 */
        .qr-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; height: 260px; border: 2px solid #38bdf8; border-radius: 30px;
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.6); z-index: 50; pointer-events: none;
            transition: border-color 0.3s;
        }

        /* 成功时的闪烁效果 */
        .qr-box.success { border-color: #10b981; border-width: 5px; }

        .laser-line {
            position: absolute; top: 5%; left: 10%; width: 80%; height: 2px;
            background: #38bdf8; box-shadow: 0 0 15px #38bdf8;
            animation: scanAnim 2.5s infinite ease-in-out;
        }

        @keyframes scanAnim { 0%, 100% { top: 10%; opacity: 0; } 50% { top: 90%; opacity: 1; } }

        .result-card {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 400px; background: #1e293b; border-radius: 20px;
            padding: 25px; display: none; z-index: 3000; border-top: 5px solid #38bdf8; text-align: center;
        }

        #progress { width: 0%; height: 6px; background: #38bdf8; transition: width 3s linear; margin-top: 15px; border-radius: 10px; }

        /* 覆盖层：强制点击以激活音频 */
        #unlock-audio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="unlock-audio" onclick="activateScanner()">
        <div style="font-size: 60px; margin-bottom: 20px;">🔔</div>
        <h2 style="margin: 0;">Sila Klik untuk Mula</h2>
        <p style="opacity: 0.8;">Ketuk skrin untuk aktifkan kamera & bunyi</p>
    </div>

    <header>
        <a href="menu.html" style="text-decoration: none; color: white; font-size: 20px;">⬅️</a>
        <span style="font-weight: 600;">Attendance Scanner</span>
        <button class="menu-btn" onclick="toggleMenu()">⋮</button>
        <div id="dropMenu" class="dropdown-menu">
            <div style="padding: 10px;">
                <label style="font-size: 11px; color: #94a3b8;">KAMERA</label>
                <select id="camSelect" onchange="changeCamera(this.value)" style="width:100%; background:#0f172a; color:white; border:1px solid #334155; padding:8px; border-radius:5px;"></select>
            </div>
            <div style="padding: 10px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 13px;">Mirror View</span>
                <input type="checkbox" id="mirrorCheck" onchange="toggleMirror(this.checked)">
            </div>
        </div>
    </header>

    <div class="scanner-container">
        <div id="reader"></div>
        <div id="custom-box" class="qr-box"><div class="laser-line"></div></div>
    </div>

    <div id="result" class="result-card">
        <h3 id="res-name" style="margin:0; text-transform: uppercase;">--</h3>
        <p id="res-class" style="margin:8px 0; color: #38bdf8; font-weight: 600;">--</p>
        <p id="res-status-text" style="font-size: 14px;">Status: <span id="res-status">--</span></p>
        <div style="background: rgba(255,255,255,0.1); border-radius: 10px;"><div id="progress"></div></div>
    </div>

    <audio id="beepSound" preload="auto">
        <source src="beep.mp3" type="audio/mpeg">
    </audio>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const html5QrCode = new Html5Qrcode("reader");
        const beep = document.getElementById('beepSound');
        const box = document.getElementById('custom-box');

        window.toggleMenu = () => document.getElementById('dropMenu').classList.toggle('show');
        window.changeCamera = (id) => { localStorage.setItem('preferredCameraId', id); location.reload(); };
        window.toggleMirror = (val) => {
            localStorage.setItem('cameraMirror', val);
            const video = document.querySelector('#reader video');
            if(video) video.style.transform = val ? "scaleX(-1)" : "scaleX(1)";
        };

        window.activateScanner = () => {
            document.getElementById('unlock-audio').style.display = 'none';
            beep.play().then(() => { beep.pause(); beep.currentTime = 0; }).catch(e => console.log(e));
            initScanner();
        };

        async function initScanner() {
            try {
                const devices = await Html5Qrcode.getCameras();
                const select = document.getElementById('camSelect');
                select.innerHTML = '';
                devices.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id; opt.text = d.label;
                    if(d.id === localStorage.getItem('preferredCameraId')) opt.selected = true;
                    select.appendChild(opt);
                });

                const isMirror = localStorage.getItem('cameraMirror') === 'true';
                document.getElementById('mirrorCheck').checked = isMirror;

                const config = { fps: 25, aspectRatio: 1.0 };
                const cameraId = localStorage.getItem('preferredCameraId') || { facingMode: "environment" };

                await html5QrCode.start(cameraId, config, onScanSuccess);
                
                const video = document.querySelector('#reader video');
                if(video) video.style.transform = isMirror ? "scaleX(-1)" : "scaleX(1)";
            } catch (e) { console.error("Scanner Error:", e); }
        }

        async function onScanSuccess(text) {
            try { await html5QrCode.stop(); } catch(e) {}
            
            beep.currentTime = 0;
            beep.play().catch(err => console.log("Audio play blocked"));
            box.classList.add('success');

            try {
                let studentData = null;
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
                const limit = localStorage.getItem('lateTimeLimit') || "07:35";
                const status = (timeStr > limit) ? "Lewat" : "Hadir";

                // --- 兼容逻辑：处理 JSON 或 纯 IC ---
                if (text.trim().startsWith('{')) {
                    studentData = JSON.parse(text);
                } else {
                    const icClean = text.trim();
                    // 默认显示，防止查不到数据时报错
                    studentData = { ic: icClean, name: "PELAJAR (REKOD BARU)", kelas: "-" };
                    
                    // 尝试从数据库获取该学生的真实姓名和班级
                    const studentDoc = await getDoc(doc(db, "students", icClean));
                    if (studentDoc.exists()) {
                        studentData = studentDoc.data();
                    }
                }

                // 更新 UI
                document.getElementById('res-name').innerText = studentData.name || "PELAJAR";
                document.getElementById('res-class').innerText = studentData.kelas || studentData.class || "-";
                document.getElementById('res-status').innerText = status.toUpperCase();
                document.getElementById('res-status').style.color = (status === "Hadir") ? "#10b981" : "#f43f5e";
                
                const card = document.getElementById('result');
                const bar = document.getElementById('progress');
                
                card.style.display = "block";
                bar.style.transition = "none"; bar.style.width = "100%";
                void bar.offsetWidth; 
                bar.style.transition = "width 3s linear"; bar.style.width = "0%";

                // 写入考勤记录到 Firebase
                await setDoc(doc(db, "attendance", `${now.toISOString().split('T')[0]}_${studentData.ic}`), {
                    ic: studentData.ic,
                    name: studentData.name || "Unknown",
                    kelas: studentData.kelas || "Unknown",
                    time: timeStr,
                    status: status,
                    timestamp: serverTimestamp()
                });

                setTimeout(() => {
                    card.style.display = "none";
                    box.classList.remove('success');
                    initScanner();
                }, 3000);

            } catch (e) { 
                console.error("Data Error:", e);
                initScanner(); 
            }
        }
    </script>
</body>
</html>
