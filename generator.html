<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Murid - SEMSIRA</title>
    <style>
        /* UI UPGRADE - iOS GLASSMORPHISM */
        body { 
            background-color: #020617; /* 更深邃的底色 */
            background-image: 
                radial-gradient(circle at top right, #1e293b, #0f172a),
                radial-gradient(circle at bottom left, rgba(56, 189, 248, 0.1), transparent);
            color: #f1f5f9; 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh; 
        }

        header { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(15px); /* 核心毛玻璃效果 */
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        /* 高级感卡片设计 */
        .card { 
            background: rgba(255, 255, 255, 0.03); /* 极低透明度背景 */
            backdrop-filter: blur(20px); /* 强力模糊 */
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; 
            padding: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.1); /* 像玻璃边缘一样的微光 */
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            margin-bottom: 25px; 
        }

        h3 { 
            color: #fff; 
            font-size: 18px;
            margin-top: 0; 
            text-align: center; 
            letter-spacing: 0.5px;
        }

        label { display: block; font-size: 11px; color: #94a3b8; margin: 10px 0 5px 8px; text-transform: uppercase; }

        /* 输入框优化 */
        input, select { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 10px; 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 16px; 
            color: white; 
            font-size: 14px; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        /* 按钮动效 */
        .btn { 
            border: none; 
            border-radius: 16px; 
            font-weight: 600; 
            padding: 16px; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            width: 100%; 
            font-size: 15px; 
        }

        .btn:active { transform: scale(0.96); }

        .btn-nfc { 
            background: rgba(56, 189, 248, 0.1); 
            border: 1px solid rgba(56, 189, 248, 0.3); 
            color: #38bdf8; 
            margin-bottom: 10px; 
        }
        
        .btn-nfc:hover { background: rgba(56, 189, 248, 0.2); }

        .btn-save { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            color: white; 
            margin-top: 15px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        #status { text-align: center; font-size: 12px; margin: 12px 0; color: #64748b; font-style: italic; }
        .back-btn { position: absolute; left: 20px; text-decoration: none; color: white; font-size: 20px; }
    </style>
</head>
<body>

    <header>
        <a href="menu.html" class="back-btn">⬅️</a>
        <span style="font-weight: 600; letter-spacing: 0.5px;">Pendaftaran Murid</span>
    </header>

    <div class="container">
        <div class="card">
            <h3>Kad NFC (Pilihan)</h3>
            <p id="status">Boleh daftar sekarang, ikat kad kemudian.</p>
            <button class="btn btn-nfc" onclick="startNfcScan()">🔍 SCAN KAD (JIKA ADA)</button>
            <label>NFC ID Code</label>
            <input type="text" id="nfcID" placeholder="Tiada kad" readonly>
        </div>

        <div class="card">
            <h3>Maklumat Peribadi</h3>
            <label>Nama Penuh</label>
            <input type="text" id="name" placeholder="NAMA MURID" required>
            <label>Nombor IC</label>
            <input type="text" id="ic" placeholder="CONTOH: 05010102XXXX" required>
            <label>Pilih Kelas</label>
            <select id="class" required>
                <option value="">-- Sila Pilih --</option>
                <option value="SUMAYYAH">SUMAYYAH</option>
                <option value="SARAH">SARAH</option>
                <option value="KHADIJAH">KHADIJAH</option>
                <option value="AISHAH">AISHAH</option>
                <option value="FATIMAH">FATIMAH</option>
                <option value="ZAINAB">ZAINAB</option>
                <option value="RUQAYYAH">RUQAYYAH</option>
                <option value="UMMU KALSOM">UMMU KALSOM</option>
            </select>
            <label>Jantina</label>
            <select id="gender" required>
                <option value="">-- Sila Pilih --</option>
                <option value="Lelaki">Lelaki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
            <button class="btn btn-save" onclick="saveToFirebase()">💾 SIMPAN REKOD</button>
        </div>
    </div>

    <script type="module">
        /* 你的逻辑部分完全保留，不做任何删除 */
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdKtcJseBEcR5CXapiAmVb8TvOw30rN1Q",
            authDomain: "semsiraf6kehadiran.firebaseapp.com",
            projectId: "semsiraf6kehadiran",
            storageBucket: "semsiraf6kehadiran.firebasestorage.app",
            messagingSenderId: "410598658230",
            appId: "1:410598658230:web:911046bf7a8d36260c9617"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.startNfcScan = async () => {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    document.getElementById('status').innerText = "📳 Sila dekatkan kad NFC...";
                    ndef.addEventListener("reading", ({ serialNumber }) => {
                        document.getElementById('nfcID').value = serialNumber.toLowerCase();
                        document.getElementById('status').innerText = "✅ Kad dikesan!";
                    });
                } catch (e) { alert(e); }
            } else { alert("Guna Chrome di Android."); }
        };

        window.saveToFirebase = async () => {
            const ic = document.getElementById('ic').value.trim();
            const name = document.getElementById('name').value.toUpperCase().trim();
            const nfcCode = document.getElementById('nfcID').value.toLowerCase().trim();
            const kelas = document.getElementById('class').value;
            const gender = document.getElementById('gender').value;

            if (!ic || !name || !kelas) return alert("Lengkapkan maklumat!");

            try {
                await setDoc(doc(db, "students", ic), {
                    ic: ic,
                    name: name,
                    nfcSeries: nfcCode, 
                    kelas: kelas,
                    gender: gender,
                    updatedAt: serverTimestamp()
                });
                alert("Berjaya disimpan!");
                location.reload();
            } catch (e) { alert(e.message); }
        };
    </script>
</body>
</html>
