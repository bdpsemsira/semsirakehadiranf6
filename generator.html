<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Murid - SEMSIRA</title>
    <style>
        /* UI UPGRADE - iOS GLASSMORPHISM & HIGH-CLASS UI */
        body { 
            background-color: #020617; 
            /* 增强多层径向渐变，模拟高端环境光 */
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.15), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.1), transparent 40%),
                radial-gradient(circle at top right, #1e293b, #020617);
            color: #f1f5f9; 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        header { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 30px rgba(0,0,0,0.3); 
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-small { 
            width: 32px; 
            height: auto; 
            margin-right: 12px;
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.4));
        }

        .container { padding: 25px 20px; max-width: 500px; margin: 0 auto; }

        /* 高级感毛玻璃卡片 */
        .card { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 28px; 
            padding: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            margin-bottom: 25px; 
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 { 
            color: #fff; 
            font-size: 17px;
            margin-top: 0; 
            margin-bottom: 20px;
            text-align: center; 
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        h3::before, h3::after {
            content: "";
            height: 1px;
            width: 20px;
            background: rgba(255,255,255,0.1);
        }

        label { 
            display: block; 
            font-size: 10px; 
            color: #94a3b8; 
            margin: 12px 0 6px 10px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-weight: 700;
        }

        /* 极简输入框设计 */
        input, select { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 5px; 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 18px; 
            color: white; 
            font-size: 14px; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, select:focus {
            border-color: #38bdf8;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
            transform: translateY(-1px);
        }

        /* 按钮动效优化 */
        .btn { 
            border: none; 
            border-radius: 18px; 
            font-weight: 600; 
            padding: 16px; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            width: 100%; 
            font-size: 15px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active { transform: scale(0.95); }

        .btn-nfc { 
            background: rgba(56, 189, 248, 0.08); 
            border: 1px dashed rgba(56, 189, 248, 0.4); 
            color: #38bdf8; 
        }
        
        .btn-nfc:hover { 
            background: rgba(56, 189, 248, 0.15); 
            border-style: solid;
        }

        .btn-save { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            color: white; 
            margin-top: 15px;
            box-shadow: 0 12px 24px -6px rgba(16, 185, 129, 0.3);
        }

        .btn-save:hover {
            box-shadow: 0 15px 30px -6px rgba(16, 185, 129, 0.5);
            filter: brightness(1.1);
        }

        #status { text-align: center; font-size: 12px; margin: 15px 0; color: #64748b; }
        .back-btn { position: absolute; left: 20px; text-decoration: none; color: white; font-size: 20px; transition: 0.3s; }
        .back-btn:hover { transform: translateX(-3px); }
    </style>
</head>
<body>

    <header>
        <a href="menu.html" class="back-btn">⬅️</a>
        <img src="semsira.png" alt="Logo" class="logo-small">
        <span style="font-weight: 600; letter-spacing: 0.5px;">Pendaftaran Murid</span>
    </header>

    <div class="container">
        <div class="card">
            <h3>Kad NFC (Pilihan)</h3>
            <p id="status">Boleh daftar sekarang, ikat kad kemudian.</p>
            <button class="btn btn-nfc" onclick="startNfcScan()">🔍 SCAN KAD (JIKA ADA)</button>
            <label>NFC ID Code</label>
            <input type="text" id="nfcID" placeholder="Tiada kad" readonly>
        </div>

        <div class="card">
            <h3>Maklumat Peribadi</h3>
            <label>Nama Penuh</label>
            <input type="text" id="name" placeholder="NAMA MURID" required>
            
            <label>Nombor IC</label>
            <input type="text" id="ic" placeholder="CONTOH: 05010102XXXX" required>
            
            <label>Pilih Kelas</label>
            <select id="class" required>
                <option value="">-- Sila Pilih --</option>
                <option value="SUMAYYAH">SUMAYYAH</option>
                <option value="SARAH">SARAH</option>
                <option value="KHADIJAH">KHADIJAH</option>
                <option value="AISHAH">AISHAH</option>
                <option value="FATIMAH">FATIMAH</option>
                <option value="ZAINAB">ZAINAB</option>
                <option value="RUQAYYAH">RUQAYYAH</option>
                <option value="UMMU KALSOM">UMMU KALSOM</option>
            </select>
            
            <label>Jantina</label>
            <select id="gender" required>
                <option value="">-- Sila Pilih --</option>
                <option value="Lelaki">Lelaki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
            
            <button class="btn btn-save" onclick="saveToFirebase()">💾 SIMPAN REKOD</button>
        </div>
    </div>

    <script type="module">
        /* 你的 JavaScript 核心逻辑完整保留 */
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdKtcJseBEcR5CXapiAmVb8TvOw30rN1Q",
            authDomain: "semsiraf6kehadiran.firebaseapp.com",
            projectId: "semsiraf6kehadiran",
            storageBucket: "semsiraf6kehadiran.firebasestorage.app",
            messagingSenderId: "410598658230",
            appId: "1:410598658230:web:911046bf7a8d36260c9617"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.startNfcScan = async () => {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    document.getElementById('status').innerText = "📳 Sila dekatkan kad NFC...";
                    ndef.addEventListener("reading", ({ serialNumber }) => {
                        document.getElementById('nfcID').value = serialNumber.toLowerCase();
                        document.getElementById('status').innerText = "✅ Kad dikesan!";
                    });
                } catch (e) { alert(e); }
            } else { alert("Guna Chrome di Android."); }
        };

        window.saveToFirebase = async () => {
            const ic = document.getElementById('ic').value.trim();
            const name = document.getElementById('name').value.toUpperCase().trim();
            const nfcCode = document.getElementById('nfcID').value.toLowerCase().trim();
            const kelas = document.getElementById('class').value;
            const gender = document.getElementById('gender').value;

            if (!ic || !name || !kelas) return alert("Lengkapkan maklumat!");

            try {
                await setDoc(doc(db, "students", ic), {
                    ic: ic,
                    name: name,
                    nfcSeries: nfcCode, 
                    kelas: kelas,
                    gender: gender,
                    updatedAt: serverTimestamp()
                });
                alert("Berjaya disimpan!");
                location.reload();
            } catch (e) { alert(e.message); }
        };
    </script>
</body>
</html>
