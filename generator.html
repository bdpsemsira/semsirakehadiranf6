<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Murid - SEMSIRA</title>
    <style>
        body { background-color: #0f172a; background-image: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f1f5f9; margin: 0; font-family: 'Poppins', sans-serif; min-height: 100vh; }
        header { background: #1e293b; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; }
        h3 { color: #38bdf8; margin-top: 0; text-align: center; }
        label { display: block; font-size: 12px; color: #94a3b8; margin: 10px 0 5px 5px; }
        input, select { width: 100%; padding: 14px; margin-bottom: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; font-size: 14px; box-sizing: border-box; outline: none; }
        .btn { border: none; border-radius: 12px; font-weight: 600; padding: 15px; cursor: pointer; transition: all 0.3s; width: 100%; font-size: 16px; }
        .btn-nfc { background: rgba(56, 189, 248, 0.1); border: 1px dashed #38bdf8; color: #38bdf8; margin-bottom: 10px; }
        .btn-save { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; margin-top: 10px; }
        #status { text-align: center; font-size: 13px; margin: 10px 0; color: #94a3b8; }
        .back-btn { position: absolute; left: 20px; text-decoration: none; color: white; font-size: 20px; }
    </style>
</head>
<body>

    <header>
        <a href="menu.html" class="back-btn">⬅️</a>
        <span style="font-weight: 600;">Pendaftaran Murid</span>
    </header>

    <div class="container">
        <div class="card">
            <h3>Kad NFC (Pilihan)</h3>
            <p id="status">Boleh daftar sekarang, ikat kad kemudian.</p>
            <button class="btn btn-nfc" onclick="startNfcScan()">🔍 SCAN KAD (JIKA ADA)</button>
            <label>NFC ID Code</label>
            <input type="text" id="nfcID" placeholder="Tiada kad" readonly>
        </div>

        <div class="card">
            <h3>Maklumat Peribadi</h3>
            <label>Nama Penuh</label>
            <input type="text" id="name" placeholder="NAMA MURID" required>
            <label>Nombor IC</label>
            <input type="text" id="ic" placeholder="CONTOH: 05010102XXXX" required>
            <label>Pilih Kelas</label>
            <select id="class" required>
                <option value="">-- Sila Pilih --</option>
                <option value="SUMAYYAH">SUMAYYAH</option>
                <option value="SARAH">SARAH</option>
                <option value="KHADIJAH">KHADIJAH</option>
                <option value="AISHAH">AISHAH</option>
                <option value="FATIMAH">FATIMAH</option>
                <option value="ZAINAB">ZAINAB</option>
                <option value="RUQAYYAH">RUQAYYAH</option>
                <option value="UMMU KALSOM">UMMU KALSOM</option>
            </select>
            <label>Jantina</label>
            <select id="gender" required>
                <option value="">-- Sila Pilih --</option>
                <option value="Lelaki">Lelaki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
            <button class="btn btn-save" onclick="saveToFirebase()">💾 SIMPAN REKOD</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdKtcJseBEcR5CXapiAmVb8TvOw30rN1Q",
            authDomain: "semsiraf6kehadiran.firebaseapp.com",
            projectId: "semsiraf6kehadiran",
            storageBucket: "semsiraf6kehadiran.firebasestorage.app",
            messagingSenderId: "410598658230",
            appId: "1:410598658230:web:911046bf7a8d36260c9617"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.startNfcScan = async () => {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    document.getElementById('status').innerText = "📳 Sila dekatkan kad NFC...";
                    ndef.addEventListener("reading", ({ serialNumber }) => {
                        // Simpan dalam format lowercase untuk konsistensi
                        document.getElementById('nfcID').value = serialNumber.toLowerCase();
                        document.getElementById('status').innerText = "✅ Kad dikesan!";
                    });
                } catch (e) { alert(e); }
            } else { alert("Guna Chrome di Android."); }
        };

        window.saveToFirebase = async () => {
            const ic = document.getElementById('ic').value.trim();
            const name = document.getElementById('name').value.toUpperCase().trim();
            const nfcCode = document.getElementById('nfcID').value.toLowerCase().trim();
            const kelas = document.getElementById('class').value;
            const gender = document.getElementById('gender').value;

            if (!ic || !name || !kelas) return alert("Lengkapkan maklumat!");

            try {
                // KEMASKINI: Field cardID ditukar kepada nfcSeries
                await setDoc(doc(db, "students", ic), {
                    ic: ic,
                    name: name,
                    nfcSeries: nfcCode, // Field baru yang selaras
                    kelas: kelas,
                    gender: gender,
                    updatedAt: serverTimestamp()
                });
                alert("Berjaya disimpan!");
                location.reload();
            } catch (e) { alert(e.message); }
        };
    </script>
</body>
</html>
