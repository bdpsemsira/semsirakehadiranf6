<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMSIRA - Log Masuk Pentadbir</title>
    <link rel="icon" href="semsira.png" type="image/png">
    <style>
        /* UI BEAUTIFICATION - DARK MODE */
        body {
            font-family: 'Poppins', 'Segoe UI', Roboto, sans-serif;
            background-color: #0f172a; /* Warna latar gelap slate */
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #f1f5f9;
        }

        .login-card {
            background: #1e293b; /* Warna kad gelap */
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05); /* Border halus */
            backdrop-filter: blur(10px);
        }

        .logo {
            width: 90px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1));
            transition: transform 0.3s ease;
        }
        
        .logo:hover {
            transform: scale(1.05);
        }

        h2 { 
            color: #ffffff; 
            margin-bottom: 25px; 
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .input-group { text-align: left; }

        input {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            border: 2px solid #334155;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #0f172a;
            color: white;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #38bdf8; /* Warna biru cerah bila fokus */
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        input::placeholder {
            color: #64748b;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        #error-msg { 
            color: #fb7185; 
            font-size: 14px; 
            margin-top: 15px; 
            display: none;
            background: rgba(251, 113, 133, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(251, 113, 133, 0.2);
        }

        /* Copyright Text Animasi */
        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="semsira.png" alt="Logo SEMSIRA" class="logo">
    <h2>Sistem Pengurusan Kehadiran</h2>
    <form id="loginForm">
        <input type="text" id="adminID" placeholder="ID Pentadbir" required>
        <input type="password" id="adminPass" placeholder="Kata Laluan" required>
        <button type="submit">LOG MASUK</button>
    </form>
    <p id="error-msg">ID atau Kata Laluan Salah!</p>
    <div class="footer-text">© 2026 SEMSIRA Management</div>
</div>

<script>
    // KOD LOGIK ANDA KEKAL SAMA - TIDAK DIUBAH
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('error-msg');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const inputID = document.getElementById('adminID').value;
        const inputPass = document.getElementById('adminPass').value;

        try {
            const response = await fetch('keys.txt');
            const data = await response.text();
            
            const [storedID, storedPass] = data.trim().split(',');

            if (inputID === storedID && inputPass === storedPass) {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'menu.html';
            } else {
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            console.error("Ralat membaca kunci:", err);
            alert("Ralat sistem: Gagal membaca fail keselamatan.");
        }
    });
</script>

</body>
</html>
