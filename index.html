<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMSIRA - Log Masuk Pentadbir</title>
    <link rel="icon" href="semsira.png" type="image/png">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 100px;
            margin-bottom: 15px;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #0056b3; }
        #error-msg { color: #d9534f; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="semsira.png" alt="Logo SEMSIRA" class="logo">
    <h2>Sistem Pengurusan Kehadiran</h2>
    <form id="loginForm">
        <input type="text" id="adminID" placeholder="ID Pentadbir" required>
        <input type="password" id="adminPass" placeholder="Kata Laluan" required>
        <button type="submit">LOG MASUK</button>
    </form>
    <p id="error-msg">ID atau Kata Laluan Salah!</p>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('error-msg');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const inputID = document.getElementById('adminID').value;
        const inputPass = document.getElementById('adminPass').value;

        try {
            // Mengambil fail keys.txt dari GitHub repository anda
            const response = await fetch('keys.txt');
            const data = await response.text();
            
            // Andaikan format keys.txt adalah "adminID,password"
            const [storedID, storedPass] = data.trim().split(',');

            if (inputID === storedID && inputPass === storedPass) {
                // Simpan status log masuk dalam session
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'menu.html';
            } else {
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            console.error("Ralat membaca kunci:", err);
            alert("Ralat sistem: Gagal membaca fail keselamatan.");
        }
    });
</script>

</body>
</html>
