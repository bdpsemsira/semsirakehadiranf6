<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* UI BEAUTIFICATION - DARK MODE */
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f1f5f9;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-small {
            width: 35px;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.1));
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        h4 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 16px;
            border-left: 4px solid #38bdf8;
            padding-left: 10px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #94a3b8;
            font-size: 11px;
        }

        input[type="month"], input[type="date"] {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            margin-bottom: 10px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .btn {
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            width: 100%;
        }

        .btn-blue { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); color: white; }
        .btn-green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #classList .btn-class {
            background: #334155;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 18px;
            font-size: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        #classList .btn-class:hover {
            background: #475569;
            transform: translateX(5px);
        }

        #totalInfo {
            color: #94a3b8;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <header>
        <a href="menu.html" style="float: left; text-decoration: none; color: white; position: absolute; left: 20px; font-size: 20px;">⬅️</a>
        <img src="semsira.png" alt="Logo" class="logo-small">
        <span style="font-weight: 600; margin-left: 10px;">Statistik Kehadiran</span>
    </header>

    <div class="container">
        <div class="card">
            <h4>Analisis Kehadiran Bulan Ini</h4>
            <div style="max-width: 220px; margin: 15px auto;">
                <canvas id="attendanceChart"></canvas>
            </div>
            <p id="totalInfo" style="text-align:center; font-size:12px; margin-top:10px;"></p>
        </div>

        <div class="card">
            <h4>Carian & Muat Turun Laporan</h4>
            <div style="margin-top:15px;">
                <label>Pilih Bulan (Laporan Bulanan):</label>
                <input type="month" id="searchMonth">
                <button class="btn btn-blue" onclick="downloadReport('month')" style="margin-bottom:15px;">📥 MUAT TURUN PDF BULANAN</button>

                <label>Pilih Tarikh (Laporan Harian):</label>
                <input type="date" id="searchDate">
                <button class="btn btn-green" onclick="downloadReport('day')">📅 MUAT TURUN PDF HARIAN</button>
            </div>
        </div>

        <div class="card">
            <h4>Senarai Kelas</h4>
            <div id="classList" style="margin-top:15px;">
                <p style="text-align:center; color:#64748b;">Memuatkan senarai kelas...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        let myChart;

        async function initDashboard() {
            await loadStatistics();
            await loadClassList();
        }

        async function loadStatistics() {
            const now = new Date();
            const yearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            const q = query(collection(db, "attendance"));
            const querySnapshot = await getDocs(q);
            
            let hadir = 0, lewat = 0;
            querySnapshot.forEach((doc) => {
                if (doc.id.startsWith(yearMonth)) {
                    const data = doc.data();
                    if (data.status === "Hadir") hadir++;
                    else if (data.status === "Lewat") lewat++;
                }
            });

            updateChart(hadir, lewat);
            document.getElementById('totalInfo').innerText = `Jumlah Rekod Bulan Ini: ${hadir + lewat}`;
        }

        function updateChart(h, l) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Hadir', 'Lewat'],
                    datasets: [{
                        data: [h, l],
                        backgroundColor: ['#10b981', '#f59e0b'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
            });
        }

        async function loadClassList() {
            const classListDiv = document.getElementById('classList');
            const classes = ["SUMAYYAH", "SARAH", "KHADIJAH", "AISHAH", "FATIMAH", "ZAINAB", "RUQAYYAH", "UMMU KALSOM"];
            classListDiv.innerHTML = "";
            classes.forEach(className => {
                const btn = document.createElement('a');
                btn.href = `class-detail.html?class=${encodeURIComponent(className)}`;
                btn.className = "btn-class";
                btn.innerHTML = `<span>🏫 ${className}</span> <span style='font-size:10px; opacity:0.6;'>LIHAT ➔</span>`;
                classListDiv.appendChild(btn);
            });
        }

        // --- 核心更新：专业格式的 PDF 生成逻辑 ---
        window.downloadReport = async (type) => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4'); // A4 比例
            const filterValue = type === 'month' ? document.getElementById('searchMonth').value : document.getElementById('searchDate').value;

            if(!filterValue) return alert("Sila pilih tarikh/bulan!");

            // 1. 获取所有学生（用于按班级排序和逻辑填充 Tidak Hadir）
            const studentSnap = await getDocs(collection(db, "students"));
            let students = [];
            studentSnap.forEach(s => students.push(s.data()));

            // 按班级名称排序
            students.sort((a, b) => (a.kelas || a.class).localeCompare(b.kelas || b.class));

            // 2. 获取考勤记录
            const q = query(collection(db, "attendance"));
            const attendanceSnap = await getDocs(q);
            const attendanceMap = {};
            attendanceSnap.forEach(d => {
                if (d.id.startsWith(filterValue)) {
                    attendanceMap[d.data().ic] = d.data();
                }
            });

            // 3. 构建表格数据并计算统计摘要
            let statHadir = 0, statLewat = 0, statTidak = 0;
            const rows = [];

            students.forEach(s => {
                const record = attendanceMap[s.ic];
                const status = record ? record.status : "Tidak Hadir";
                const time = record ? record.time : "---";
                const className = s.kelas || s.class;

                if (status === "Hadir") statHadir++;
                else if (status === "Lewat") statLewat++;
                else statTidak++;

                rows.push([s.name, className, time, status]);
            });

            // 4. 绘制 PDF 头部 (Logo 和 标题)
            // 注意：'semsira.png' 必须在同一目录下，且 jsPDF 支持图片需为 Base64 或已加载。
            // 这里我们先绘制文字标题，模拟 Profil 里的 Header 格式
            doc.setFillColor(30, 41, 59); // 深色背景
            doc.rect(0, 0, 210, 40, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(20);
            doc.setFont("helvetica", "bold");
            doc.text("LAPORAN KEHADIRAN SEMSIRA", 105, 20, { align: "center" });
            
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.text(`${type === 'month' ? 'LAPORAN BULANAN' : 'LAPORAN HARIAN'}: ${filterValue}`, 105, 30, { align: "center" });

            // 5. 绘制统计摘要卡片
            doc.setTextColor(0, 0, 0);
            doc.setDrawColor(200, 200, 200);
            doc.line(14, 45, 196, 45);
            
            doc.setFontSize(11);
            doc.text(`RINGKASAN:`, 14, 55);
            doc.setTextColor(34, 197, 94); // Green
            doc.text(`Hadir: ${statHadir}`, 45, 55);
            doc.setTextColor(245, 158, 11); // Orange
            doc.text(`Lewat: ${statLewat}`, 85, 55);
            doc.setTextColor(239, 68, 68); // Red
            doc.text(`Tidak Hadir: ${statTidak}`, 125, 55);
            doc.setTextColor(0, 0, 0);
            doc.text(`Jumlah Murid: ${students.length}`, 165, 55);

            // 6. 生成表格
            doc.autoTable({
                head: [['Nama Murid', 'Kelas', 'Masa', 'Status']],
                body: rows,
                startY: 65,
                theme: 'striped',
                headStyles: { fillColor: [2, 132, 199], halign: 'center' },
                columnStyles: {
                    0: { cellWidth: 80 }, // 名字宽一点
                    1: { halign: 'center' },
                    2: { halign: 'center' },
                    3: { halign: 'center', fontStyle: 'bold' }
                },
                didDrawCell: (data) => {
                    // 如果状态是 Tidak Hadir，把文字变成红色
                    if (data.section === 'body' && data.column.index === 3) {
                        if (data.cell.raw === "Tidak Hadir") {
                            doc.setTextColor(239, 68, 68);
                        } else if (data.cell.raw === "Lewat") {
                            doc.setTextColor(245, 158, 11);
                        } else {
                            doc.setTextColor(34, 197, 94);
                        }
                    }
                }
            });

            doc.save(`Laporan_SEMSIRA_${filterValue}.pdf`);
        };

        initDashboard();
    </script>
</body>
</html>
