<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* UI BEAUTIFICATION - iOS GLASSMORPHISM */
        body { 
            background-color: #020617; 
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.12) 0%, transparent 40%);
            color: #f1f5f9; 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh; 
        }

        header { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }

        .logo-small { width: 35px; filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.5)); }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* --- iOS GLASS CARD --- */
        .card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px; 
            padding: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            margin-bottom: 25px; 
        }

        h4 { 
            margin-top: 0; 
            color: #fff; 
            font-size: 17px; 
            border-left: 4px solid #38bdf8; 
            padding-left: 12px; 
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 12px; font-weight: 600; text-transform: uppercase; }

        input[type="month"], input[type="date"] { 
            width: 100%; 
            padding: 14px; 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 14px; 
            color: white; 
            margin-bottom: 12px; 
            font-family: inherit; 
            box-sizing: border-box; 
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #38bdf8; background: rgba(15, 23, 42, 0.8); }

        .btn { 
            border: none; 
            border-radius: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 14px; 
            width: 100%; 
            gap: 10px; 
        }

        .btn-blue { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); color: white; }
        .btn-green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
        .btn:active { transform: scale(0.96); }

        /* CLASS LIST GLASS ITEM */
        .btn-class { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 18px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: white; 
            text-decoration: none; 
            border-radius: 20px; 
            transition: 0.3s; 
        }

        .btn-class:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .attendance-badge { 
            background: rgba(56, 189, 248, 0.15); 
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 4px 12px; 
            border-radius: 10px; 
            font-size: 13px; 
            font-weight: 700; 
        }

        #totalInfo { color: #94a3b8; font-size: 13px; font-weight: 300; }
    </style>
</head>
<body>
    <header>
        <a href="menu.html" style="text-decoration: none; color: white; position: absolute; left: 20px; font-size: 20px;">⬅️</a>
        <img src="semsira.png" alt="Logo" class="logo-small">
        <span style="font-weight: 600; margin-left: 10px; letter-spacing: 0.5px;">Statistik Kehadiran</span>
    </header>

    <div class="container">
        <div class="card">
            <h4>Analisis Kehadiran Hari Ini</h4>
            <div style="max-width: 200px; margin: 0 auto;">
                <canvas id="attendanceChart"></canvas>
            </div>
            <p id="totalInfo" style="text-align:center; margin-top:15px;"></p>
        </div>

        <div class="card">
            <h4>Cetak Laporan</h4>
            <label>Laporan Bulanan (Lewat/Ponteng):</label>
            <input type="month" id="searchMonth">
            <button class="btn btn-blue" onclick="printReport('month')" style="margin-bottom:20px;">🖨️ CETAK BULANAN</button>

            <label>Laporan Harian:</label>
            <input type="date" id="searchDate">
            <button class="btn btn-green" onclick="printReport('day')">🖨️ CETAK HARIAN</button>
        </div>

        <div class="card" style="background: transparent; border: none; box-shadow: none; padding: 0;">
            <h4 style="margin-left: 24px;">Senarai Kelas</h4>
            <div id="classList"></div>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, getDocs, query } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        let myChart;
        const LIST_KELAS = ["SUMAYYAH", "SARAH", "KHADIJAH", "AISHAH", "FATIMAH", "ZAINAB", "RUQAYYAH", "UMMU KALSOM"];

        // --- 核心修复：时区处理函数 ---
        function getLocalToday() {
            return new Date().toLocaleDateString('en-CA'); // 返回 YYYY-MM-DD (本地时区)
        }

        async function initDashboard() {
            setDefaultDates();
            await loadStatistics();
            await loadClassList();
        }

        function setDefaultDates() {
            const localToday = getLocalToday();
            document.getElementById('searchMonth').value = localToday.substring(0, 7);
            document.getElementById('searchDate').value = localToday;
        }

        async function getBaseData() {
            const studentSnap = await getDocs(collection(db, "students"));
            const attendanceSnap = await getDocs(collection(db, "attendance"));
            let students = [];
            studentSnap.forEach(doc => students.push(doc.data()));
            let attendance = [];
            attendanceSnap.forEach(doc => attendance.push({id: doc.id, ...doc.data()}));
            return { students, attendance };
        }

        async function loadStatistics() {
            const { students, attendance } = await getBaseData();
            const todayStr = getLocalToday(); // 修复时区后的日期
            
            let hadir = 0, lewat = 0;
            attendance.forEach(rec => {
                if (rec.id.startsWith(todayStr)) {
                    // 逻辑：12:00 之后算不出席
                    if (rec.time <= "12:00") {
                        if (rec.status === "Hadir") hadir++;
                        else if (rec.status === "Lewat") lewat++;
                    }
                }
            });

            let tidakHadir = students.length - (hadir + lewat);
            updateChart(hadir, lewat, tidakHadir);
            document.getElementById('totalInfo').innerText = `Jumlah Keseluruhan: ${students.length} Murid`;
            return { students, attendance, todayStr };
        }

        function updateChart(h, l, t) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Hadir', 'Lewat', 'Ponteng'],
                    datasets: [{
                        data: [h, l, t],
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                        hoverOffset: 4,
                        borderWidth: 0
                    }]
                },
                options: { 
                    cutout: '80%', 
                    plugins: { 
                        legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 }, padding: 20 } } 
                    } 
                }
            });
        }

        async function loadClassList() {
            const { students, attendance, todayStr } = await loadStatistics();
            const classListDiv = document.getElementById('classList');
            classListDiv.innerHTML = "";

            LIST_KELAS.forEach(className => {
                const muridKelas = students.filter(s => (s.kelas || s.class) === className);
                const hadirKelas = attendance.filter(a => a.id.startsWith(todayStr) && muridKelas.some(m => m.ic === a.ic)).length;
                const peratus = muridKelas.length > 0 ? Math.round((hadirKelas / muridKelas.length) * 100) : 0;

                const btn = document.createElement('a');
                btn.href = `class-detail.html?class=${encodeURIComponent(className)}`;
                btn.className = "btn-class";
                btn.innerHTML = `
                    <span>🏫 ${className}</span>
                    <div style="display:flex;align-items:center;gap:12px;">
                        <span class="attendance-badge">${peratus}%</span>
                        <span style="color: #475569;">➔</span>
                    </div>`;
                classListDiv.appendChild(btn);
            });
        }

        // PDF 打印逻辑保留原有功能
        window.printReport = async (type) => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const filterValue = type === 'month' ? document.getElementById('searchMonth').value : document.getElementById('searchDate').value;
            if(!filterValue) return alert("Sila pilih tarikh/bulan!");

            const { students, attendance } = await getBaseData();
            
            // PDF Header Logic... (保持原样)
            doc.setFontSize(14); doc.text(type === 'month' ? "LAPORAN MASALAH KEHADIRAN (BULANAN)" : "LAPORAN KEHADIRAN HARIAN", 14, 20);
            doc.setFontSize(9); doc.text(`Rujukan: ${filterValue}`, 14, 26);
            
            let currentY = 35;
            for (const className of LIST_KELAS) {
                const muridKelas = students.filter(s => (s.kelas || s.class) === className);
                if (muridKelas.length === 0) continue;

                let rows = [];
                muridKelas.forEach(s => {
                    const studentRecs = attendance.filter(a => a.id.startsWith(filterValue) && a.ic === s.ic);
                    studentRecs.forEach(r => {
                        let status = r.status;
                        if (r.time > "12:00") status = "Ponteng";
                        rows.push([s.name, r.time, status]);
                    });
                });

                if (rows.length > 0) {
                    doc.text(`KELAS: ${className}`, 14, currentY);
                    doc.autoTable({
                        head: [['Nama', 'Masa', 'Status']],
                        body: rows,
                        startY: currentY + 2,
                        theme: 'grid',
                        styles: { fontSize: 8 }
                    });
                    currentY = doc.lastAutoTable.finalY + 10;
                }
            }
            window.open(doc.output('bloburl'));
        };

        initDashboard();
    </script>
</body>
</html>
