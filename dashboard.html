<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* UI BEAUTIFICATION - DARK MODE */
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f1f5f9;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-small {
            width: 35px;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.1));
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        h4 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 16px;
            border-left: 4px solid #38bdf8;
            padding-left: 10px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #94a3b8;
            font-size: 11px;
        }

        input[type="month"], input[type="date"] {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            margin-bottom: 10px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .btn {
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            width: 100%;
        }

        .btn-blue { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); color: white; }
        .btn-green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #classList .btn-class {
            background: #334155;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 18px;
            font-size: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        #classList .btn-class:hover {
            background: #475569;
            transform: translateX(5px);
        }

        #totalInfo {
            color: #94a3b8;
            font-weight: 500;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <header>
        <a href="menu.html" style="float: left; text-decoration: none; color: white; position: absolute; left: 20px; font-size: 20px;">⬅️</a>
        <img src="semsira.png" alt="Logo" class="logo-small">
        <span style="font-weight: 600; margin-left: 10px;">Statistik Kehadiran</span>
    </header>

    <div class="container">
        <div class="card">
            <h4>Analisis Kehadiran Bulan Ini</h4>
            <div style="max-width: 220px; margin: 15px auto;">
                <canvas id="attendanceChart"></canvas>
            </div>
            <p id="totalInfo" style="text-align:center; font-size:12px; margin-top:10px;">Memuatkan statistik...</p>
        </div>

        <div class="card">
            <h4>Carian & Muat Turun Laporan</h4>
            <div style="margin-top:15px;">
                <label>Pilih Bulan (Laporan Bulanan):</label>
                <input type="month" id="searchMonth">
                <button class="btn btn-blue" onclick="downloadReport('month')" style="margin-bottom:15px;">📥 MUAT TURUN PDF BULANAN</button>

                <label>Pilih Tarikh (Laporan Harian):</label>
                <input type="date" id="searchDate">
                <button class="btn btn-green" onclick="downloadReport('day')">📅 MUAT TURUN PDF HARIAN</button>
            </div>
        </div>

        <div class="card">
            <h4>Senarai Kelas</h4>
            <div id="classList" style="margin-top:15px;">
                <p style="text-align:center; color:#64748b;">Memuatkan senarai kelas...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        let myChart;

        async function initDashboard() {
            await loadStatistics();
            await loadClassList();
        }

        // --- 更新后的统计逻辑：包含逻辑生成的 Tidak Hadir ---
        async function loadStatistics() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const todayDate = now.getDate();
            const yearMonth = `${year}-${String(month + 1).padStart(2, '0')}`;
            
            // 1. 获取所有学生总数
            const studentSnap = await getDocs(collection(db, "students"));
            const totalStudents = studentSnap.size;

            // 2. 计算本月至今的工作日天数 (跳过周日)
            let workingDays = 0;
            for (let i = 1; i <= todayDate; i++) {
                const d = new Date(year, month, i);
                if (d.getDay() !== 0) workingDays++; // 不计算周日
            }

            // 3. 应有的总签到次数 (学生人数 * 工作日天数)
            const totalExpectedAttendance = totalStudents * workingDays;

            // 4. 获取实际签到记录
            const attendanceSnap = await getDocs(collection(db, "attendance"));
            
            let hadir = 0, lewat = 0;
            attendanceSnap.forEach((doc) => {
                if (doc.id.startsWith(yearMonth)) {
                    const data = doc.data();
                    if (data.status === "Hadir") hadir++;
                    else if (data.status === "Lewat") lewat++;
                }
            });

            // 5. 剩下的就是 Tidak Hadir (逻辑生成)
            let tidakHadir = totalExpectedAttendance - (hadir + lewat);
            if (tidakHadir < 0) tidakHadir = 0; // 防止数据异常

            updateChart(hadir, lewat, tidakHadir);
            document.getElementById('totalInfo').innerHTML = `
                Sesi Persekolahan (Bulan Ini): ${workingDays} Hari<br>
                Hadir: ${hadir} | Lewat: ${lewat} | <span style="color:#ef4444">Tidak Hadir: ${tidakHadir}</span>
            `;
        }

        function updateChart(h, l, t) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            if(myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Hadir', 'Lewat', 'Tidak Hadir'],
                    datasets: [{
                        data: [h, l, t],
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: { 
                    cutout: '70%',
                    plugins: { 
                        legend: { 
                            position: 'bottom',
                            labels: { color: '#94a3b8', font: { family: 'Poppins', size: 10 } }
                        } 
                    } 
                }
            });
        }

        async function loadClassList() {
            const classListDiv = document.getElementById('classList');
            const classes = ["SUMAYYAH", "SARAH", "KHADIJAH", "AISHAH", "FATIMAH", "ZAINAB", "RUQAYYAH", "UMMU KALSOM"];
            
            classListDiv.innerHTML = "";
            classes.forEach(className => {
                const btn = document.createElement('a');
                btn.href = `class-detail.html?class=${encodeURIComponent(className)}`;
                btn.className = "btn-class";
                btn.innerHTML = `<span>🏫 ${className}</span> <span style='font-size:10px; opacity:0.6;'>LIHAT ➔</span>`;
                classListDiv.appendChild(btn);
            });
        }

        window.downloadReport = async (type) => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const filterValue = type === 'month' ? document.getElementById('searchMonth').value : document.getElementById('searchDate').value;

            if(!filterValue) return alert("Sila pilih tarikh/bulan!");

            // 获取所有学生，以便对照谁没签到
            const studentSnap = await getDocs(collection(db, "students"));
            const students = [];
            studentSnap.forEach(s => students.push(s.data()));

            const q = query(collection(db, "attendance"));
            const attendanceSnap = await getDocs(q);
            
            const attendanceMap = {};
            attendanceSnap.forEach(d => {
                if (d.id.startsWith(filterValue)) {
                    attendanceMap[d.data().ic] = d.data();
                }
            });

            const rows = [];
            students.forEach(s => {
                const record = attendanceMap[s.ic];
                if (type === 'day') {
                    // 日报表逻辑：如果这天没记录，显示 Tidak Hadir
                    rows.push([
                        s.name, 
                        s.kelas, 
                        record ? record.time : "---", 
                        record ? record.status : "Tidak Hadir"
                    ]);
                } else {
                    // 月报表只列出已有的签到记录（避免数据量过大导致PDF崩溃）
                    if (record) {
                        rows.push([s.name, s.kelas, record.time, record.status]);
                    }
                }
            });

            if(rows.length === 0) return alert("Tiada data ditemui.");

            doc.setFontSize(18);
            doc.text(`LAPORAN KEHADIRAN SEMSIRA`, 14, 20);
            doc.setFontSize(11);
            doc.text(`${type === 'month' ? 'Bulan' : 'Tarikh'}: ${filterValue}`, 14, 28);
            
            doc.autoTable({
                head: [['Nama Murid', 'Kelas', 'Masa', 'Status']],
                body: rows,
                startY: 35,
                theme: 'striped',
                headStyles: { fillColor: [2, 132, 199] },
                didDrawCell: (data) => {
                    if (data.section === 'body' && data.column.index === 3) {
                        if (data.cell.raw === "Tidak Hadir") {
                            doc.setTextColor(239, 68, 68);
                        }
                    }
                }
            });
            doc.save(`Laporan_SEMSIRA_${filterValue}.pdf`);
        };

        initDashboard();
    </script>
</body>
</html>
