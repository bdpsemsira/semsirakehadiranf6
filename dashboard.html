<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { background-color: #0f172a; background-image: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f1f5f9; margin: 0; font-family: 'Poppins', sans-serif; min-height: 100vh; }
        header { background: #1e293b; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; }
        .logo-small { width: 35px; filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.1)); }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 20px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; }
        h4 { margin-top: 0; color: #38bdf8; font-size: 16px; border-left: 4px solid #38bdf8; padding-left: 10px; }
        label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 11px; }
        input[type="month"], input[type="date"] { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; margin-bottom: 10px; font-family: inherit; box-sizing: border-box; }
        .btn { border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; padding: 12px; width: 100%; gap: 10px; }
        .btn-blue { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); color: white; }
        .btn-green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        #classList .btn-class { background: #334155; border: 1px solid rgba(255,255,255,0.05); padding: 18px; font-size: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; color: white; text-decoration: none; border-radius: 12px; transition: 0.3s; }
        #totalInfo { color: #94a3b8; font-weight: 500; }
    </style>
</head>
<body>
    <header>
        <a href="menu.html" style="float: left; text-decoration: none; color: white; position: absolute; left: 20px; font-size: 20px;">⬅️</a>
        <img src="semsira.png" alt="Logo" class="logo-small">
        <span style="font-weight: 600; margin-left: 10px;">Statistik Kehadiran</span>
    </header>

    <div class="container">
        <div class="card">
            <h4>Analisis Kehadiran Hari Ini</h4>
            <div style="max-width: 220px; margin: 15px auto;">
                <canvas id="attendanceChart"></canvas>
            </div>
            <p id="totalInfo" style="text-align:center; font-size:12px; margin-top:10px;"></p>
        </div>

        <div class="card">
            <h4>Cetak Laporan</h4>
            <div style="margin-top:15px;">
                <label>Pilih Bulan:</label>
                <input type="month" id="searchMonth">
                <button class="btn btn-blue" onclick="printReport('month')" style="margin-bottom:15px;">🖨️ CETAK LAPORAN BULANAN</button>

                <label>Pilih Tarikh:</label>
                <input type="date" id="searchDate">
                <button class="btn btn-green" onclick="printReport('day')">🖨️ CETAK LAPORAN HARIAN</button>
            </div>
        </div>

        <div class="card">
            <h4>Senarai Kelas</h4>
            <div id="classList" style="margin-top:15px;"></div>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, getDocs, query } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        let myChart;
        const LIST_KELAS = ["SUMAYYAH", "SARAH", "KHADIJAH", "AISHAH", "FATIMAH", "ZAINAB", "RUQAYYAH", "UMMU KALSOM"];

        async function initDashboard() {
            setDefaultDates();
            await loadStatistics();
            await loadClassList();
        }

        function setDefaultDates() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            document.getElementById('searchMonth').value = `${year}-${month}`;
            document.getElementById('searchDate').value = `${year}-${month}-${day}`;
        }

        async function loadStatistics() {
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            
            const studentSnap = await getDocs(collection(db, "students"));
            const totalStudents = studentSnap.size;

            const q = query(collection(db, "attendance"));
            const querySnapshot = await getDocs(q);
            
            let hadir = 0, lewat = 0;
            querySnapshot.forEach((doc) => {
                if (doc.id.startsWith(todayStr)) {
                    const data = doc.data();
                    if (data.status === "Hadir") hadir++;
                    else if (data.status === "Lewat") lewat++;
                }
            });

            let tidakHadir = totalStudents - (hadir + lewat);
            updateChart(hadir, lewat, tidakHadir);
            document.getElementById('totalInfo').innerText = `Jumlah Murid: ${totalStudents}`;
        }

        function updateChart(h, l, t) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Hadir', 'Lewat', 'Tidak Hadir'],
                    datasets: [{
                        data: [h, l, t],
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
            });
        }

        async function loadClassList() {
            const classListDiv = document.getElementById('classList');
            classListDiv.innerHTML = "";
            LIST_KELAS.forEach(className => {
                const btn = document.createElement('a');
                btn.href = `class-detail.html?class=${encodeURIComponent(className)}`;
                btn.className = "btn-class";
                btn.innerHTML = `<span>🏫 ${className}</span> <span>➔</span>`;
                classListDiv.appendChild(btn);
            });
        }

        function getBase64Image(imgUrl) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = imgUrl;
                img.setAttribute('crossOrigin', 'anonymous');
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0);
                    resolve(canvas.toDataURL("image/png"));
                };
                img.onerror = error => resolve(null); // Resolve null instead of reject to keep running
            });
        }

        window.printReport = async (type) => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const filterValue = type === 'month' ? document.getElementById('searchMonth').value : document.getElementById('searchDate').value;

            if(!filterValue) return alert("Sila pilih tarikh!");

            // 1. Ambil Data
            const studentSnap = await getDocs(collection(db, "students"));
            let students = [];
            studentSnap.forEach(s => students.push(s.data()));

            const attendanceSnap = await getDocs(collection(db, "attendance"));
            const attendanceMap = {};
            attendanceSnap.forEach(d => { 
                if (d.id.startsWith(filterValue)) attendanceMap[d.data().ic] = d.data(); 
            });

            // 2. Header PDF
            let currentY = 15;
            const logoBase64 = await getBase64Image('semsira.png');
            if(logoBase64) doc.addImage(logoBase64, 'PNG', 14, 10, 15, 15);

            doc.setFontSize(16); doc.setTextColor(40);
            doc.text("LAPORAN KEHADIRAN MENGIKUT KELAS", 35, 18);
            doc.setFontSize(10); doc.setTextColor(100);
            doc.text(`Tarikh/Bulan: ${filterValue} | Dijana pada: ${new Date().toLocaleString()}`, 35, 23);
            doc.line(14, 28, 196, 28);
            
            currentY = 35;

            // 3. Proses Mengikut Kelas
            for (const className of LIST_KELAS) {
                const muridKelas = students.filter(s => (s.kelas || s.class) === className);
                if (muridKelas.length === 0) continue;

                muridKelas.sort((a, b) => a.name.localeCompare(b.name));

                let cH = 0, cL = 0, cT = 0;
                const rows = muridKelas.map(s => {
                    const rec = attendanceMap[s.ic];
                    const status = rec ? rec.status : "Tidak Hadir";
                    if(status === "Hadir") cH++; else if(status === "Lewat") cL++; else cT++;
                    return [s.name, rec ? rec.time : "---", status];
                });

                // Cek ruang kertas
                if (currentY > 240) { doc.addPage(); currentY = 20; }

                // Kotak Info Kelas
                doc.setFillColor(240, 247, 255);
                doc.rect(14, currentY, 182, 10, 'F');
                doc.setFontSize(10); doc.setFont(undefined, 'bold'); doc.setTextColor(0);
                doc.text(`KELAS: ${className}`, 18, currentY + 7);
                
                doc.setFontSize(8); doc.setFont(undefined, 'normal');
                doc.text(`Hadir: ${cH} | Lewat: ${cL} | Tidak Hadir: ${cT} | Jumlah: ${muridKelas.length}`, 120, currentY + 7);

                // Jadual Murid
                doc.autoTable({
                    head: [['Nama Murid', 'Masa', 'Status']],
                    body: rows,
                    startY: currentY + 12,
                    theme: 'grid',
                    styles: { fontSize: 8 },
                    headStyles: { fillColor: [51, 65, 85] },
                    didParseCell: (data) => {
                        if (data.section === 'body' && data.column.index === 2) {
                            const val = data.cell.raw;
                            if (val === "Tidak Hadir") data.cell.styles.textColor = [200, 0, 0];
                            else if (val === "Lewat") data.cell.styles.textColor = [255, 140, 0];
                            else data.cell.styles.textColor = [0, 150, 0];
                        }
                    }
                });

                currentY = doc.lastAutoTable.finalY + 12;
            }

            const string = doc.output('bloburl');
            window.open(string);
        };

        initDashboard();
    </script>
</body>
</html>
