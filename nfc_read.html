<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Scan - SEMSIRA</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .result-box { background: #1e293b; padding: 30px; border-radius: 20px; margin-top: 50px; border-top: 5px solid #38bdf8; display: none; }
        .res-error { border-top: 5px solid #ef4444 !important; }
        
        .loader { margin-top: 100px; animation: pulse 1.5s infinite; color: #38bdf8; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .btn-back { position: absolute; top: 20px; left: 20px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; z-index: 10000; }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="activateNFC()">
        <div style="font-size: 70px; margin-bottom: 20px;">📡</div>
        <h2>Ketuk untuk Mula Scan</h2>
        <p style="color: #38bdf8;">Sila klik di sini untuk aktifkan NFC</p>
    </div>

    <button class="btn-back" onclick="location.href='index.html'">⬅️</button>
    
    <div id="wait-ui" class="loader" style="display: none;">
        <div style="font-size: 60px;">📳</div>
        <h3>Sila dekatkan kad NFC...</h3>
    </div>

    <div id="result-ui" class="result-box">
        <h1 id="resName">--</h1>
        <h2 id="resClass" style="color: #38bdf8;">--</h2>
        <p id="resID" style="font-size: 12px; color: #64748b;"></p>
        <button onclick="location.reload()" style="background:#38bdf8; border:none; color:white; padding:12px 25px; border-radius:10px; margin-top:20px; font-weight:bold;">SCAN LAGI</button>
    </div>

    <audio id="beep" src="beep.mp3" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdKtcJseBEcR5CXapiAmVb8TvOw30rN1Q",
            authDomain: "semsiraf6kehadiran.firebaseapp.com",
            projectId: "semsiraf6kehadiran",
            storageBucket: "semsiraf6kehadiran.firebasestorage.app",
            messagingSenderId: "410598658230",
            appId: "1:410598658230:web:911046bf7a8d36260c9617"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const beep = document.getElementById('beep');

        window.activateNFC = async () => {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    
                    document.getElementById('start-overlay').style.display = 'none';
                    document.getElementById('wait-ui').style.display = 'block';
                    
                    // 解锁声音
                    beep.play().then(() => { beep.pause(); beep.currentTime = 0; }).catch(()=>{});

                    ndef.addEventListener("reading", async ({ serialNumber }) => {
                        // 统一转为小写，确保与数据库匹配
                        const standardizedID = serialNumber.toLowerCase();
                        
                        beep.currentTime = 0;
                        beep.play().catch(()=>{});
                        
                        checkStudent(standardizedID);
                    });

                } catch (error) {
                    alert("NFC Error: " + error.message);
                }
            } else {
                alert("Sila gunakan Chrome di Android untuk NFC.");
            }
        };

        async function checkStudent(nfcId) {
            // 核心修复：改用 query 搜索 cardID 字段，而不是直接找文档 ID
            const q = query(collection(db, "students"), where("cardID", "==", nfcId));
            
            try {
                const querySnapshot = await getDocs(q);
                
                document.getElementById('wait-ui').style.display = 'none';
                const resultUI = document.getElementById('result-ui');
                resultUI.style.display = 'block';
                resultUI.classList.remove('res-error');

                if (!querySnapshot.empty) {
                    // 找到学生了
                    const data = querySnapshot.docs[0].data();
                    document.getElementById('resName').innerText = data.name;
                    document.getElementById('resClass').innerText = data.kelas;
                    document.getElementById('resID').innerText = "NFC ID: " + nfcId;
                    
                    // 这里可以添加签到逻辑（比如写入 attendance collection）
                } else {
                    // 没找到学生
                    resultUI.classList.add('res-error');
                    document.getElementById('resName').innerText = "KAD TIDAK BERDAFTAR";
                    document.getElementById('resClass').innerText = "Sila daftar kad di Profil Murid";
                    document.getElementById('resID').innerText = "ID: " + nfcId;
                }
            } catch (e) {
                console.error(e);
                alert("Ralat database: " + e.message);
            }
        }
    </script>
</body>
</html>
