<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Attendance - SEMSIRA</title>
    <style>
        body { background: #020617; color: white; font-family: 'Poppins', sans-serif; text-align: center; padding: 20px; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.98); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .result-box { background: #1e293b; padding: 30px; border-radius: 20px; margin-top: 50px; border-top: 5px solid #38bdf8; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .res-error { border-top: 5px solid #ef4444 !important; }
        .res-success { border-top: 5px solid #22c55e !important; }
        
        .loader { margin-top: 100px; animation: pulse 1.5s infinite; color: #38bdf8; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .btn-back { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 15px; border-radius: 10px; cursor: pointer; z-index: 10000; }
        .status-msg { font-weight: bold; margin-top: 10px; display: block; }
        .time-label { font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="activateNFC()">
        <div style="font-size: 80px; margin-bottom: 20px;">📡</div>
        <h2>KETUK UNTUK MULA</h2>
        <p style="color: #38bdf8;">Klik skrin untuk mengaktifkan pembaca NFC</p>
    </div>

    <button class="btn-back" onclick="history.back()">⬅️ KEMBALI</button>
    
    <div id="wait-ui" class="loader">
        <div style="font-size: 60px;">📳</div>
        <h3>Sila dekatkan kad NFC...</h3>
        <p id="system-status" style="font-size: 12px; color: #64748b;">Sistem sedia</p>
    </div>

    <div id="result-ui" class="result-box">
        <h1 id="resName">--</h1>
        <h2 id="resClass" style="color: #38bdf8;">--</h2>
        <div id="attendance-status" class="status-msg">--</div>
        <p id="resID" style="font-size: 11px; color: #64748b; margin-top: 15px; font-family: monospace;"></p>
        <button onclick="resetUI()" style="background:#38bdf8; border:none; color:white; padding:12px 25px; border-radius:10px; margin-top:20px; font-weight:bold; cursor:pointer;">SCAN SETERUSNYA</button>
    </div>

    <audio id="beepSuccess" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <audio id="beepError" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdKtcJseBEcR5CXapiAmVb8TvOw30rN1Q",
            authDomain: "semsiraf6kehadiran.firebaseapp.com",
            projectId: "semsiraf6kehadiran",
            storageBucket: "semsiraf6kehadiran.firebasestorage.app",
            messagingSenderId: "410598658230",
            appId: "1:410598658230:web:911046bf7a8d36260c9617"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const beepS = document.getElementById('beepSuccess');
        const beepE = document.getElementById('beepError');

        // Mengaktifkan NFC
        window.activateNFC = async () => {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    
                    document.getElementById('start-overlay').style.display = 'none';
                    document.getElementById('system-status').innerText = "Pembaca NFC Aktif";

                    ndef.addEventListener("reading", async ({ serialNumber }) => {
                        // Konsisten guna lowercase untuk padanan tepat
                        const nfcId = serialNumber.toLowerCase().trim();
                        handleScan(nfcId);
                    });

                } catch (error) {
                    alert("Ralat NFC: " + error.message);
                }
            } else {
                alert("Browser tidak menyokong NFC. Gunakan Chrome di Android.");
            }
        };

        async function handleScan(nfcId) {
            document.getElementById('wait-ui').style.display = 'none';
            const resultUI = document.getElementById('result-ui');
            resultUI.style.display = 'block';
            resultUI.classList.remove('res-success', 'res-error');
            document.getElementById('resName').innerText = "Menyemak...";

            try {
                // KEMASKINI: Sekarang mencari di bawah padanan field 'nfcSeries'
                const q = query(collection(db, "students"), where("nfcSeries", "==", nfcId));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const studentDoc = querySnapshot.docs[0];
                    const data = studentDoc.data();
                    
                    // Berjaya jumpa murid
                    beepS.play();
                    resultUI.classList.add('res-success');
                    document.getElementById('resName').innerText = data.name;
                    document.getElementById('resClass').innerText = data.kelas;
                    document.getElementById('resID').innerText = "ID: " + nfcId;

                    // Simpan rekod kehadiran
                    markAttendance(data);

                } else {
                    // Kad tidak didaftarkan
                    beepE.play();
                    resultUI.classList.add('res-error');
                    document.getElementById('resName').innerText = "KAD TIDAK BERDAFTAR";
                    document.getElementById('resClass').innerText = "Sila kemaskini ID Kad di Profil Murid";
                    document.getElementById('attendance-status').innerText = "❌ Gagal";
                    document.getElementById('resID').innerText = "ID: " + nfcId;
                }
            } catch (e) {
                console.error(e);
                document.getElementById('resName').innerText = "RALAT SISTEM";
            }
        }

        async function markAttendance(student) {
            const now = new Date();
            const dateKey = now.toISOString().split('T')[0];
            const timeStr = now.toLocaleTimeString('ms-MY', { hour12: false, hour: '2-digit', minute: '2-digit' });

            // Syarat lewat: Selepas 7:30 pagi
            const status = (now.getHours() > 7 || (now.getHours() === 7 && now.getMinutes() > 30)) ? "Lewat" : "Hadir";
            
            const attID = `${dateKey}_${student.ic}`;
            
            try {
                await setDoc(doc(db, "attendance", attID), {
                    ic: student.ic,
                    name: student.name,
                    kelas: student.kelas,
                    status: status,
                    time: timeStr,
                    timestamp: now
                });

                document.getElementById('attendance-status').innerHTML = 
                    `<span style="color:#22c55e">✅ Rekod Disimpan!</span><br><span class="time-label">Status: ${status} (${timeStr})</span>`;
            } catch (e) {
                document.getElementById('attendance-status').innerText = "⚠️ Gagal simpan rekod";
            }
        }

        window.resetUI = () => {
            document.getElementById('result-ui').style.display = 'none';
            document.getElementById('wait-ui').style.display = 'block';
            document.getElementById('attendance-status').innerText = "--";
            document.getElementById('system-status').innerText = "Pembaca NFC Aktif";
        };
    </script>
</body>
</html>
