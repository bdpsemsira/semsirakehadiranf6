<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Scan - SEMSIRA</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .result-box { background: #1e293b; padding: 30px; border-radius: 20px; margin-top: 50px; border-top: 5px solid #38bdf8; display: none; }
        .loader { margin-top: 100px; animation: pulse 1.5s infinite; color: #38bdf8; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div style="text-align: left;"><button onclick="location.href='nfctest.html'" style="background:none; border:none; color:white; font-size:20px;">⬅️</button></div>
    
    <div id="wait-ui" class="loader">
        <div style="font-size: 60px;">📳</div>
        <h3>Sila dekatkan kad NFC...</h3>
    </div>

    <div id="result-ui" class="result-box">
        <h1 id="resName">--</h1>
        <h2 id="resClass" style="color: #38bdf8;">--</h2>
        <p id="resID" style="font-size: 12px; color: #64748b;"></p>
        <button onclick="location.reload()" style="background:#38bdf8; border:none; color:white; padding:10px 20px; border-radius:10px; margin-top:20px;">SCAN LAGI</button>
    </div>

    <audio id="beep" src="beep.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdKtcJseBEcR5CXapiAmVb8TvOw30rN1Q",
            authDomain: "semsiraf6kehadiran.firebaseapp.com",
            projectId: "semsiraf6kehadiran",
            storageBucket: "semsiraf6kehadiran.firebasestorage.app",
            messagingSenderId: "410598658230",
            appId: "1:410598658230:web:911046bf7a8d36260c9617"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const beep = document.getElementById('beep');

        async function initNFC() {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    ndef.addEventListener("reading", async ({ serialNumber }) => {
                        beep.play().catch(()=>{});
                        checkStudent(serialNumber);
                    });
                } catch (e) { alert("NFC Error: " + e); }
            } else { alert("Sila guna Chrome di Android."); }
        }

        async function checkStudent(id) {
            const docRef = doc(db, "students", id);
            const docSnap = await getDoc(docRef);

            document.getElementById('wait-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('resName').innerText = data.name;
                document.getElementById('resClass').innerText = data.kelas;
                document.getElementById('resID').innerText = "NFC ID: " + id;
            } else {
                document.getElementById('resName').innerText = "TIDAK BERDAFTAR";
                document.getElementById('resClass').innerText = "Sila daftar kad dahulu";
                document.getElementById('resID').innerText = "ID: " + id;
            }
        }

        // 自动启动
        window.onload = initNFC;
    </script>
</body>
</html>
