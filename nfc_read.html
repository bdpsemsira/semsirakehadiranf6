<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Scan - SEMSIRA</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* 启动界面遮罩 */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .result-box { background: #1e293b; padding: 30px; border-radius: 20px; margin-top: 50px; border-top: 5px solid #38bdf8; display: none; }
        
        .loader { margin-top: 100px; animation: pulse 1.5s infinite; color: #38bdf8; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .btn-back { position: absolute; top: 20px; left: 20px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; z-index: 10000; }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="activateNFC()">
        <div style="font-size: 70px; margin-bottom: 20px;">📡</div>
        <h2>Ketuk untuk Mula Scan</h2>
        <p style="color: #38bdf8;">Sila klik di sini untuk aktifkan NFC</p>
    </div>

    <button class="btn-back" onclick="location.href='nfctest.html'">⬅️</button>
    
    <div id="wait-ui" class="loader" style="display: none;">
        <div style="font-size: 60px;">📳</div>
        <h3>Sila dekatkan kad NFC...</h3>
    </div>

    <div id="result-ui" class="result-box">
        <h1 id="resName">--</h1>
        <h2 id="resClass" style="color: #38bdf8;">--</h2>
        <p id="resID" style="font-size: 12px; color: #64748b;"></p>
        <button onclick="location.reload()" style="background:#38bdf8; border:none; color:white; padding:12px 25px; border-radius:10px; margin-top:20px; font-weight:bold;">SCAN LAGI</button>
    </div>

    <audio id="beep" src="beep.mp3" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdKtcJseBEcR5CXapiAmVb8TvOw30rN1Q",
            authDomain: "semsiraf6kehadiran.firebaseapp.com",
            projectId: "semsiraf6kehadiran",
            storageBucket: "semsiraf6kehadiran.firebasestorage.app",
            messagingSenderId: "410598658230",
            appId: "1:410598658230:web:911046bf7a8d36260c9617"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const beep = document.getElementById('beep');

        // 核心激活函数
        window.activateNFC = async () => {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    // 此时用户刚刚点击，浏览器会允许弹出权限申请
                    await ndef.scan();
                    
                    // 隐藏启动遮罩，显示扫描 UI
                    document.getElementById('start-overlay').style.display = 'none';
                    document.getElementById('wait-ui').style.display = 'block';
                    
                    // 解锁音频
                    beep.play().then(() => { beep.pause(); beep.currentTime = 0; });

                    ndef.addEventListener("reading", async ({ serialNumber }) => {
                        beep.currentTime = 0;
                        beep.play().catch(()=>{});
                        checkStudent(serialNumber);
                    });

                } catch (error) {
                    console.error(error);
                    if (error.name === "NotAllowedError") {
                        alert("Akses NFC ditolak. Sila benarkan dalam tetapan browser.");
                    } else {
                        alert("NFC Error: " + error.message);
                    }
                }
            } else {
                alert("Browser anda tidak menyokong Web NFC. Sila pastikan anda menggunakan Chrome di Android.");
            }
        };

        async function checkStudent(id) {
            const docRef = doc(db, "students", id);
            const docSnap = await getDoc(docRef);

            document.getElementById('wait-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('resName').innerText = data.name;
                document.getElementById('resClass').innerText = data.kelas;
                document.getElementById('resID').innerText = "NFC ID: " + id;
            } else {
                document.getElementById('resName').innerText = "KAD TIDAK BERDAFTAR";
                document.getElementById('resClass').innerText = "Sila daftar kad dahulu";
                document.getElementById('resID').innerText = "ID: " + id;
            }
        }
    </script>
</body>
</html>
