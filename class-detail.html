<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butiran Kelas - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        /* UI BEAUTIFICATION - DARK MODE */
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f1f5f9;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .logo-small {
            width: 35px;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.1));
        }

        .container {
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 18px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        input[type="date"] {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            margin-top: 8px;
            font-family: inherit;
        }

        #attendancePercentage {
            color: #38bdf8;
            font-size: 1.2em;
        }

        /* Rekaan Jadual Dark Mode */
        table {
            width: 100%;
            border-collapse: collapse;
            color: #e2e8f0;
        }

        th {
            background-color: #334155;
            color: #94a3b8;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            padding: 12px 10px;
            text-align: left;
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .btn-blue {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-blue:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        /* Status Styling */
        .status-hadir { color: #10b981 !important; font-weight: bold; }
        .status-lewat { color: #f59e0b !important; font-weight: bold; }
        .status-none { color: #64748b !important; font-style: italic; font-size: 12px; }

    </style>
</head>
<body>
    <header>
        <a href="dashboard.html" style="float: left; text-decoration: none; color: white; position: absolute; left: 20px; font-size: 20px;">⬅️</a>
        <img src="semsira.png" alt="Logo" class="logo-small">
        <span id="classNameTitle" style="font-weight: 600; margin-left: 12px;">Memuatkan...</span>
    </header>

    <div class="container">
        <div class="card">
            <label style="font-size: 12px; color: #94a3b8;">Pilih Tarikh Semakan:</label>
            <input type="date" id="filterDate">
            <p style="margin-top: 15px; font-size: 14px;">Peratus Hadir: <b id="attendancePercentage">0%</b></p>
        </div>

        <div class="card" style="padding: 0; overflow: hidden;">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Nama Murid</th>
                            <th>Status</th>
                            <th style="text-align: center;">Profil</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody">
                        <tr>
                            <td colspan="3" style="text-align:center; padding: 30px; color: #64748b;">Mencari data murid...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        // KOD LOGIK ASAL ANDA KEKAL SAMA
        import { db } from './js/firebase-config.js';
        import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const selectedClass = urlParams.get('class');
        document.getElementById('classNameTitle').innerText = `Kelas: ${selectedClass}`;

        const dateInput = document.getElementById('filterDate');
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;

        async function loadClassData() {
            const tableBody = document.getElementById('studentTableBody');
            const dateValue = dateInput.value;
            tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 30px;">Memuatkan...</td></tr>`;

            try {
                const qStudents = query(collection(db, "students"), where("kelas", "==", selectedClass));
                const studentSnapshot = await getDocs(qStudents);
                
                const qAttendance = query(collection(db, "attendance"));
                const attendanceSnapshot = await getDocs(qAttendance);
                
                const attendanceMap = new Map();
                attendanceSnapshot.forEach(doc => {
                    if (doc.id.startsWith(dateValue)) {
                        const data = doc.data();
                        attendanceMap.set(data.ic, data);
                    }
                });

                let html = "";
                let countHadir = 0;
                let totalStudents = 0;

                studentSnapshot.forEach((doc) => {
                    totalStudents++;
                    const student = doc.data();
                    const attendanceRecord = attendanceMap.get(student.ic);
                    
                    let statusHtml = `<span class="status-none">Tiada Rekod</span>`;
                    if (attendanceRecord) {
                        countHadir++;
                        const statusClass = attendanceRecord.status === "Hadir" ? "status-hadir" : "status-lewat";
                        statusHtml = `<span class="padding: 10px; border-radius: 5px;" class="${statusClass}">${attendanceRecord.status} <small style="display:block; font-weight:normal; opacity:0.8;">${attendanceRecord.time}</small></span>`;
                    }

                    html += `
                        <tr>
                            <td style="font-size: 13px; font-weight: 500;">${student.name}</td>
                            <td>${statusHtml}</td>
                            <td style="text-align: center;">
                                <button onclick="location.href='profile.html?id=${student.ic}'" class="btn btn-blue" style="padding:8px 15px; font-size:11px;">PROFIL</button>
                            </td>
                        </tr>
                    `;
                });

                if (totalStudents === 0) {
                    tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 30px; color: #64748b;">Tiada murid berdaftar dalam kelas ini.</td></tr>`;
                    document.getElementById('attendancePercentage').innerText = "0%";
                } else {
                    tableBody.innerHTML = html;
                    const percentage = Math.round((countHadir / totalStudents) * 100);
                    document.getElementById('attendancePercentage').innerText = `${percentage}%`;
                }

            } catch (error) {
                console.error("Ralat:", error);
                tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 30px; color:#fb7185;">Gagal memuatkan data.</td></tr>`;
            }
        }

        dateInput.addEventListener('change', loadClassData);
        window.onload = loadClassData;
    </script>
</body>
</html>
