<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butiran Kelas - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        /* UI BEAUTIFICATION - DARK MODE */
        body {
            background-color: #020617;
            background-image: radial-gradient(circle at top right, #1e293b, #020617);
            color: #f1f5f9;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        header {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-small {
            width: 35px;
            filter: drop-shadow(0 0 5px rgba(56, 189, 248, 0.4));
        }

        .container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        input[type="date"] {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            margin-top: 8px;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="date"]:focus {
            border-color: #38bdf8;
        }

        #attendancePercentage {
            color: #38bdf8;
            font-size: 1.6em;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        /* 表格优化 */
        table {
            width: 100%;
            border-collapse: collapse;
            color: #e2e8f0;
        }

        th {
            background-color: rgba(30, 41, 59, 0.5);
            color: #94a3b8;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            padding: 15px 12px;
            text-align: left;
            border-bottom: 2px solid #334155;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: middle;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .btn-blue {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            transition: 0.3s;
        }

        .btn-blue:active { transform: scale(0.95); }

        .status-badge {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            text-align: center;
        }
        .status-hadir { background: rgba(16, 185, 129, 0.15); color: #10b981 !important; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-lewat { background: rgba(245, 158, 11, 0.15); color: #f59e0b !important; border: 1px solid rgba(245, 158, 11, 0.2); }
        .status-none { color: #64748b !important; font-style: italic; font-size: 12px; }

    </style>
</head>
<body>
    <header>
        <a href="dashboard.html" style="text-decoration: none; color: white; position: absolute; left: 20px; font-size: 20px;">⬅️</a>
        <img src="semsira.png" alt="Logo" class="logo-small">
        <span id="classNameTitle" style="font-weight: 600; margin-left: 12px; letter-spacing: 0.5px;">Memuatkan...</span>
    </header>

    <div class="container">
        <div class="card">
            <label style="font-size: 12px; color: #94a3b8; font-weight: 700; text-transform: uppercase;">Pilih Tarikh Semakan:</label>
            <input type="date" id="filterDate">
            <div style="margin-top: 15px; display: flex; align-items: center; justify-content: space-between;">
                <span style="font-size: 14px; color: #cbd5e1;">Peratus Kehadiran:</span>
                <b id="attendancePercentage">0%</b>
            </div>
        </div>

        <div class="card" style="padding: 0; overflow: hidden;">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Nama Murid</th>
                            <th>Status</th>
                            <th style="text-align: center;">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody">
                        <tr>
                            <td colspan="3" style="text-align:center; padding: 40px; color: #64748b;">
                                <div class="loading-text">Menyemak database...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const selectedClass = urlParams.get('class');
        document.getElementById('classNameTitle').innerText = `${selectedClass}`;

        const dateInput = document.getElementById('filterDate');

        // --- 核心修复：获取马来西亚本地日期 (YYYY-MM-DD) ---
        function getLocalToday() {
            const now = new Date();
            // 使用 en-CA 区域设置是因为它返回 YYYY-MM-DD 格式，非常干净
            return now.toLocaleDateString('en-CA'); 
        }

        dateInput.value = getLocalToday();

        async function loadClassData() {
            const tableBody = document.getElementById('studentTableBody');
            const dateValue = dateInput.value; // 用户选择的日期 (YYYY-MM-DD)
            
            tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 40px; color: #94a3b8;">Memuatkan data murid...</td></tr>`;

            try {
                // 1. 获取该班级所有学生
                const qStudents = query(collection(db, "students"), where("kelas", "==", selectedClass));
                const studentSnapshot = await getDocs(qStudents);
                
                // 2. 获取所有考勤记录
                const qAttendance = query(collection(db, "attendance"));
                const attendanceSnapshot = await getDocs(qAttendance);
                
                // 3. 过滤出匹配日期的记录
                const attendanceMap = new Map();
                attendanceSnapshot.forEach(doc => {
                    // doc.id 格式通常是 "2024-03-11_IC号码"
                    if (doc.id.startsWith(dateValue)) {
                        const data = doc.data();
                        attendanceMap.set(data.ic, data);
                    }
                });

                let html = "";
                let countHadir = 0;
                let totalStudents = 0;

                const students = [];
                studentSnapshot.forEach(doc => students.push(doc.data()));
                // 名字 A-Z 排序
                students.sort((a, b) => a.name.localeCompare(b.name));

                students.forEach((student) => {
                    totalStudents++;
                    const attendanceRecord = attendanceMap.get(student.ic);
                    
                    let statusHtml = `<span class="status-none">Belum Hadir</span>`;
                    
                    if (attendanceRecord) {
                        countHadir++;
                        const statusClass = (attendanceRecord.status === "Hadir") ? "status-hadir" : "status-lewat";
                        statusHtml = `
                            <div class="status-badge ${statusClass}">
                                ${attendanceRecord.status}
                                <span style="display:block; font-size: 10px; font-weight: normal; opacity: 0.8;">${attendanceRecord.time}</span>
                            </div>`;
                    }

                    html += `
                        <tr>
                            <td style="font-size: 13px; font-weight: 500;">${student.name}</td>
                            <td>${statusHtml}</td>
                            <td style="text-align: center;">
                                <button onclick="location.href='profile.html?id=${student.ic}'" class="btn-blue" style="font-size:11px;">PROFIL</button>
                            </td>
                        </tr>
                    `;
                });

                if (totalStudents === 0) {
                    tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 40px; color: #64748b;">Tiada murid berdaftar dalam kelas ${selectedClass}.</td></tr>`;
                    document.getElementById('attendancePercentage').innerText = "0%";
                } else {
                    tableBody.innerHTML = html;
                    const percentage = Math.round((countHadir / totalStudents) * 100);
                    document.getElementById('attendancePercentage').innerText = `${percentage}%`;
                }

            } catch (error) {
                console.error("Ralat Firebase:", error);
                tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 40px; color:#fb7185;">Ralat Rangkaian: Sila periksa sambungan internet.</td></tr>`;
            }
        }

        dateInput.addEventListener('change', loadClassData);
        window.onload = loadClassData;
    </script>
</body>
</html>
