<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Murid - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* UI - 深色模式 */
        body { background-color: #0f172a; background-image: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f1f5f9; margin: 0; font-family: 'Poppins', sans-serif; min-height: 100vh; }
        
        header { 
            background: #1e293b; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 15px 25px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }

        .header-title { flex-grow: 1; text-align: right; font-weight: 600; }
        .logo-small { width: 35px; margin-right: 15px; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; }
        #qrcode-outer { background: white; padding: 15px; border-radius: 15px; display: inline-block; margin: 15px 0; }
        h2 { color: #ffffff; margin: 10px 0; font-size: 22px; text-transform: uppercase; }
        h4 { color: #38bdf8; border-bottom: 1px solid #334155; padding-bottom: 10px; text-align: left; }
        .info-p { margin: 5px 0; color: #94a3b8; font-size: 14px; }
        .highlight-ic { font-weight: bold; color: #38bdf8; font-size: 16px; }
        
        .status-hadir { color: #22c55e !important; }
        .status-lewat { color: #f97316 !important; }
        .status-tidak { color: #ef4444 !important; }

        .record-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 14px; }
        .rec-date { color: #f1f5f9; }
        .rec-time { color: #94a3b8; font-size: 12px; margin-left: 8px; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-blue { background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%); color: white; }
        .btn-orange { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
        .btn-red { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .back-link { text-decoration: none; color: white; font-size: 20px; margin-right: 10px; }

        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: #1e293b; margin: 15% auto; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; border: 1px solid #334155; }
        .modal-content h3 { margin-top: 0; color: #38bdf8; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .modal-content label { font-size: 12px; color: #94a3b8; }

        @media print {
            @page { margin: 0; size: auto; }
            body { margin: 1.5cm; background: white !important; color: black !important; }
            header, .btn-group, .back-link, #qrcode-outer, .btn-red, .modal { display: none !important; }
            .container { max-width: 100%; padding: 0; }
            .card { background: white !important; border: none !important; box-shadow: none !important; text-align: left !important; padding: 10px 0; }
            #print-header { display: flex !important; flex-direction: column; align-items: center; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 20px; }
            #print-logo { width: 80px; height: auto; margin-bottom: 10px; }
            #print-title { font-size: 18px; font-weight: bold; text-align: center; color: black; }
            h2 { color: black !important; font-size: 20px; margin-top: 10px; }
            h4 { color: black !important; border-bottom: 1px solid black !important; }
            .info-p, .highlight-ic { color: black !important; font-size: 12px; }
            .record-item { border-bottom: 1px solid #ddd !important; color: black !important; }
            #summary-box { display: block !important; margin-top: 15px; border: 1px solid black; padding: 10px; color: black; }
        }
        #print-header, #summary-box { display: none; }
    </style>
</head>
<body>
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Kemaskini Profil</h3>
            <label>No. IC (Tetap)</label>
            <input type="text" id="edit-ic" disabled>
            
            <label>Nama Penuh</label>
            <input type="text" id="edit-name">
            
            <label>Kelas</label>
            <select id="edit-class">
                <option value="SUMAYYAH">SUMAYYAH</option>
                <option value="SARAH">SARAH</option>
                <option value="KHADIJAH">KHADIJAH</option>
                <option value="AISHAH">AISHAH</option>
                <option value="FATIMAH">FATIMAH</option>
                <option value="ZAINAB">ZAINAB</option>
                <option value="RUQAYYAH">RUQAYYAH</option>
                <option value="UMMU KALSOM">UMMU KALSOM</option>
            </select>

            <label>NFC Card ID (Sila letak kad pada pembaca)</label>
            <input type="text" id="edit-nfc" placeholder="Menunggu imbasan...">

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn btn-blue" id="saveEditBtn" style="flex: 2;">SIMPAN</button>
                <button class="btn btn-red" onclick="closeModal()" style="flex: 1;">BATAL</button>
            </div>
        </div>
    </div>

    <div id="print-header">
        <img src="semsira.png" id="print-logo" alt="Logo">
        <div id="print-title">LAPORAN KEHADIRAN MURID SEMSIRA</div>
    </div>

    <header>
        <a href="javascript:history.back()" class="back-link">⬅️</a>
        <img src="semsira.png" alt="Logo" class="logo-small">
        <span class="header-title">Profil Murid - SEMSIRA</span>
    </header>

    <div class="container">
        <div class="card">
            <div id="qrcode-outer"><div id="qrcode"></div></div>
            <h2 id="p-name">Mencari...</h2>
            <p id="p-ic" class="info-p highlight-ic">IC: -</p>
            <p id="p-class" class="info-p">Kelas: -</p>
            <p id="p-gender" class="info-p">Jantina: -</p>
            <div id="p-nfc-display" style="font-size: 10px; color: #475569; margin-top: 5px;">NFC: -</div>
        </div>

        <div class="card" style="text-align: left;">
            <h4>Rekod Kehadiran Bulanan</h4>
            
            <div id="summary-box">
                <b>RINGKASAN KEHADIRAN:</b><br>
                Hadir: <span id="count-hadir" class="status-hadir">0</span> | 
                Lewat: <span id="count-lewat" class="status-lewat">0</span> | 
                Tidak Hadir: <span id="count-tidak" class="status-tidak">0</span>
            </div>

            <div id="attendanceHistory">
                <p style="text-align:center; color:#64748b; padding: 20px;">Memuatkan rekod...</p>
            </div>

            <div class="btn-group">
                <button class="btn btn-orange" onclick="openModal()">✏️ KEMASKINI PROFIL</button>
                <button class="btn btn-blue" onclick="window.print()">🖨️ CETAK LAPORAN / PDF</button>
                <button class="btn btn-red" id="deleteBtn">🗑️ HAPUS MURID</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs, query, where, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdKtcJseBEcR5CXapiAmVb8TvOw30rN1Q",
            authDomain: "semsiraf6kehadiran.firebaseapp.com",
            projectId: "semsiraf6kehadiran",
            storageBucket: "semsiraf6kehadiran.firebasestorage.app",
            messagingSenderId: "410598658230",
            appId: "1:410598658230:web:911046bf7a8d36260c9617"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        let studentID = urlParams.get('id');
        let currentDocRef = null;

        async function loadProfile() {
            try {
                let data = null;
                const docRef = doc(db, "students", studentID);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    data = docSnap.data();
                    currentDocRef = docSnap.ref;
                } else {
                    const q = query(collection(db, "students"), where("ic", "==", studentID));
                    const querySnapshot = await getDocs(q);
                    if (!querySnapshot.empty) {
                        data = querySnapshot.docs[0].data();
                        currentDocRef = querySnapshot.docs[0].ref;
                    }
                }

                if (data) {
                    document.getElementById('p-name').innerText = data.name;
                    document.getElementById('p-ic').innerText = `IC: ${data.ic}`;
                    document.getElementById('p-class').innerText = `Kelas: ${data.kelas}`;
                    document.getElementById('p-gender').innerText = `Jantina: ${data.gender}`;
                    document.getElementById('p-nfc-display').innerText = `NFC UID: ${data.cardID || 'Belum didaftar'}`;
                    
                    document.getElementById("qrcode").innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), {
                        text: JSON.stringify({ic: data.ic, name: data.name, kelas: data.kelas}),
                        width: 150, height: 150
                    });

                    // 预填 Modal 数据
                    document.getElementById('edit-ic').value = data.ic;
                    document.getElementById('edit-name').value = data.name;
                    document.getElementById('edit-class').value = data.kelas;
                    document.getElementById('edit-nfc').value = data.cardID || "";

                    loadAttendance(data.ic);
                    document.getElementById('deleteBtn').onclick = () => deleteStudent(currentDocRef);
                    document.getElementById('saveEditBtn').onclick = () => saveProfileUpdate(currentDocRef);
                }
            } catch (e) { console.error(e); }
        }

        async function saveProfileUpdate(docRef) {
            const newName = document.getElementById('edit-name').value;
            const newClass = document.getElementById('edit-class').value;
            const newNfc = document.getElementById('edit-nfc').value;

            if (!newName) return alert("Nama tidak boleh kosong!");

            try {
                await updateDoc(docRef, {
                    name: newName,
                    kelas: newClass,
                    cardID: newNfc
                });
                alert("Profil Berjaya Dikemaskini!");
                closeModal();
                loadProfile(); // 刷新页面数据
            } catch (e) {
                alert("Ralat mengemaskini: " + e.message);
            }
        }

        async function loadAttendance(ic) {
            const q = query(collection(db, "attendance"), where("ic", "==", ic));
            const snap = await getDocs(q);
            const historyDiv = document.getElementById('attendanceHistory');
            historyDiv.innerHTML = "";

            let countHadir = 0, countLewat = 0, countTidak = 0;
            const existingRecords = {};
            snap.forEach(doc => {
                const datePart = doc.id.split('_')[0]; 
                existingRecords[datePart] = doc.data();
            });

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const todayDate = now.getDate();
            const dayNames = ["Ahad", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat", "Sabtu"];

            for (let i = todayDate; i >= 1; i--) {
                const d = new Date(year, month, i);
                const dayOfWeek = d.getDay();
                if (dayOfWeek === 0 || dayOfWeek === 6) continue;

                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                const dateKey = `${yyyy}-${mm}-${dd}`;
                
                let status, time, colorClass;
                if (existingRecords[dateKey]) {
                    const res = existingRecords[dateKey];
                    status = res.status;
                    time = res.time || "--:--";
                    if (status === "Hadir") { countHadir++; colorClass = "status-hadir"; }
                    else if (status === "Lewat") { countLewat++; colorClass = "status-lewat"; }
                } else {
                    status = "Tidak Hadir"; time = "---"; countTidak++; colorClass = "status-tidak";
                }

                const div = document.createElement('div');
                div.className = "record-item";
                div.innerHTML = `<span><b>${dateKey} (${dayNames[dayOfWeek]})</b><span class="rec-time">${time}</span></span> <b class="${colorClass}">${status}</b>`;
                historyDiv.appendChild(div);
            }
            document.getElementById('count-hadir').innerText = countHadir;
            document.getElementById('count-lewat').innerText = countLewat;
            document.getElementById('count-tidak').innerText = countTidak;
        }

        async function deleteStudent(docRef) {
            if (confirm("Padam murid ini secara kekal?")) {
                await deleteDoc(docRef);
                alert("Murid telah dipadam.");
                location.href = 'dashboard.html';
            }
        }

        // Modal 控制
        window.openModal = () => document.getElementById('editModal').style.display = 'block';
        window.closeModal = () => document.getElementById('editModal').style.display = 'none';

        window.onload = loadProfile;
    </script>
</body>
</html>
