<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Murid - SEMSIRA</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* UI - MODE GELAP (WEB) */
        body { background-color: #0f172a; background-image: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f1f5f9; margin: 0; font-family: 'Poppins', sans-serif; min-height: 100vh; }
        
        header { 
            background: #1e293b; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 15px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            position: relative;
        }

        .back-link { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); text-decoration: none; color: white; font-size: 20px; }
        .logo-small { width: 45px; margin-bottom: 5px; }
        .header-title { font-weight: 600; font-size: 16px; letter-spacing: 1px; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; }
        
        #qrcode-outer { background: white; padding: 15px; border-radius: 15px; display: inline-block; margin: 15px 0; }
        
        .student-info-grid { text-align: left; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; border-top: 1px solid #334155; padding-top: 15px; }
        .info-item b { color: #38bdf8; font-size: 12px; display: block; text-transform: uppercase; }
        .info-item span { font-size: 15px; font-weight: 500; }

        .record-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 13px; }
        .status-hadir { color: #22c55e !important; }
        .status-lewat { color: #f97316 !important; }
        .status-tidak { color: #ef4444 !important; font-weight: bold; }

        /* BUTTONS */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-blue { background: #0284c7; color: white; }
        .btn-orange { background: #f59e0b; color: white; }
        .btn-red { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .full-width { grid-column: span 2; }

        /* 打印格式优化 */
        #print-header, #print-footer { display: none; }

        @media print {
            /* 核心修改：强制隐藏浏览器自带的页眉页脚 */
            @page { 
                margin: 0.5cm; 
                size: auto; 
            }
            
            body { background: white; color: black; padding: 0; }
            header, .btn-group, .back-link, .btn-red, .modal, #p-nfc-display, #qrcode-outer { display: none !important; }
            
            .container { max-width: 100%; padding: 0; }
            .card { background: white; border: none; box-shadow: none; padding: 10px; color: black; }
            
            #print-header { 
                display: flex; align-items: center; border-bottom: 2px solid black; 
                padding-bottom: 10px; margin-bottom: 20px; 
            }
            .print-logo { width: 70px; margin-right: 20px; }
            .print-title { text-align: left; }
            .print-title h1 { margin: 0; font-size: 18px; color: black; }
            .print-title p { margin: 0; font-size: 12px; color: black; }

            .student-info-grid { 
                border: 1px solid #000; padding: 15px; background: #f9f9f9; 
                grid-template-columns: 1fr 1fr; margin-bottom: 20px;
            }
            .info-item b { color: black !important; }
            .record-item { border-bottom: 1px solid #ddd; color: black; }
            
            /* 自定义页脚显示 1/1 */
            #print-footer { 
                display: block; position: fixed; bottom: 0; width: 100%; 
                text-align: center; font-size: 10px; padding: 10px 0;
            }
        }

        /* Modal Simple */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #1e293b; margin: 15% auto; padding: 20px; border-radius: 15px; width: 80%; max-width: 350px; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="print-header">
        <img src="semsira.png" class="print-logo">
        <div class="print-title">
            <h1>LAPORAN KEHADIRAN MURID INDIVIDU</h1>
            <p>SEKOLAH MENENGAH SAINS INDERA SYAHPUTRA (SEMSIRA)</p>
            <p id="print-date-range"></p>
        </div>
    </div>

    <header>
        <a href="javascript:history.back()" class="back-link">⬅️</a>
        <img src="semsira.png" alt="Logo" class="logo-small">
        <span class="header-title">KEHADIRAN SEMSIRA</span>
    </header>

    <div class="container">
        <div class="card">
            <div id="qrcode-outer"><div id="qrcode"></div></div>
            <h2 id="p-name" style="margin: 10px 0; text-transform: uppercase;">MEMUATKAN...</h2>
            
            <div class="student-info-grid">
                <div class="info-item"><b>No. Kad Pengenalan</b><span id="p-ic">-</span></div>
                <div class="info-item"><b>Kelas</b><span id="p-class">-</span></div>
                <div class="info-item"><b>Jantina</b><span id="p-gender">-</span></div>
                <div class="info-item"><b>Status Murid</b><span>Aktif</span></div>
            </div>
            <div id="p-nfc-display" style="font-size: 10px; color: #64748b; margin-top: 15px; font-family: monospace;">ID KAD: -</div>
        </div>

        <div class="card" style="text-align: left;">
            <h4 style="margin-top:0; color: #38bdf8; border-bottom: 1px solid #334155; padding-bottom: 10px;">Rekod Kehadiran Bulanan</h4>
            
            <div id="summary-box" style="background: rgba(56, 189, 248, 0.1); padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 12px; display: flex; justify-content: space-around;">
                <span>Hadir: <b id="count-hadir" class="status-hadir">0</b></span>
                <span>Lewat: <b id="count-lewat" class="status-lewat">0</b></span>
                <span>Ponteng: <b id="count-tidak" class="status-tidak">0</b></span>
            </div>

            <div id="attendanceHistory">
                <p style="text-align:center; color:#64748b;">Memproses rekod...</p>
            </div>

            <div class="btn-group">
                <button class="btn btn-orange" onclick="openModal()">✏️ KEMASKINI</button>
                <button class="btn btn-blue" onclick="window.print()">🖨️ CETAK LAPORAN</button>
                <button class="btn btn-red full-width" id="deleteBtn">🗑️ HAPUS REKOD MURID</button>
            </div>
        </div>
    </div>

    <div id="print-footer">1/1</div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#38bdf8; margin-top:0;">Kemaskini Profil</h3>
            <input type="text" id="edit-name" placeholder="Nama Penuh">
            <select id="edit-class">
                <option value="SUMAYYAH">SUMAYYAH</option>
                <option value="SARAH">SARAH</option>
                <option value="KHADIJAH">KHADIJAH</option>
                <option value="AISHAH">AISHAH</option>
                <option value="FATIMAH">FATIMAH</option>
                <option value="ZAINAB">ZAINAB</option>
                <option value="RUQAYYAH">RUQAYYAH</option>
                <option value="UMMU KALSOM">UMMU KALSOM</option>
            </select>
            <input type="text" id="edit-nfc" placeholder="ID Kad NFC">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-blue" id="saveEditBtn" style="flex:1;">SIMPAN</button>
                <button class="btn btn-red" onclick="closeModal()" style="flex:1;">BATAL</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs, query, where, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdKtcJseBEcR5CXapiAmVb8TvOw30rN1Q",
            authDomain: "semsiraf6kehadiran.firebaseapp.com",
            projectId: "semsiraf6kehadiran",
            storageBucket: "semsiraf6kehadiran.firebasestorage.app",
            messagingSenderId: "410598658230",
            appId: "1:410598658230:web:911046bf7a8d36260c9617"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        let studentID = urlParams.get('id');
        let currentDocRef = null;

        async function loadProfile() {
            try {
                const docRef = doc(db, "students", studentID);
                const docSnap = await getDoc(docRef);
                let data = docSnap.exists() ? docSnap.data() : null;

                if (!data) {
                    const q = query(collection(db, "students"), where("ic", "==", studentID));
                    const qs = await getDocs(q);
                    if (!qs.empty) { data = qs.docs[0].data(); currentDocRef = qs.docs[0].ref; }
                } else { currentDocRef = docRef; }

                if (data) {
                    document.getElementById('p-name').innerText = data.name;
                    document.getElementById('p-ic').innerText = data.ic;
                    document.getElementById('p-class').innerText = data.kelas;
                    document.getElementById('p-gender').innerText = data.gender || "Lelaki";
                    document.getElementById('p-nfc-display').innerText = `ID KAD: ${data.cardID || 'TIADA'}`;
                    
                    document.getElementById("qrcode").innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), { text: data.ic, width: 120, height: 120 });

                    const monthNames = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];
                    const now = new Date();
                    document.getElementById('print-date-range').innerText = `Bulan: ${monthNames[now.getMonth()]} ${now.getFullYear()}`;

                    loadAttendance(data.ic);
                }
            } catch (e) { console.error(e); }
        }

        async function loadAttendance(ic) {
            const q = query(collection(db, "attendance"), where("ic", "==", ic));
            const snap = await getDocs(q);
            const historyDiv = document.getElementById('attendanceHistory');
            historyDiv.innerHTML = "";

            let c_h = 0, c_l = 0, c_t = 0;
            const records = {};
            snap.forEach(d => records[d.id.split('_')[0]] = d.data());

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const today = now.getDate();
            const dayNames = ["Ahad", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat", "Sabtu"];

            for (let i = today; i >= 1; i--) {
                const d = new Date(year, month, i);
                if (d.getDay() === 0 || d.getDay() === 6) continue;

                const key = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                let status = "Tidak Hadir", masa = "---", cls = "status-tidak";

                if (records[key]) {
                    masa = records[key].time || "00:00";
                    if (masa > "12:00") {
                        status = "Tidak Hadir";
                        cls = "status-tidak";
                        c_t++;
                    } else {
                        status = records[key].status;
                        if (status === "Hadir") { c_h++; cls = "status-hadir"; }
                        else { c_l++; cls = "status-lewat"; }
                    }
                } else { c_t++; }

                const item = document.createElement('div');
                item.className = "record-item";
                item.innerHTML = `<span><b>${key} (${dayNames[d.getDay()]})</b> - ${masa}</span><span class="${cls}">${status}</span>`;
                historyDiv.appendChild(item);
            }
            document.getElementById('count-hadir').innerText = c_h;
            document.getElementById('count-lewat').innerText = c_l;
            document.getElementById('count-tidak').innerText = c_t;
        }

        window.openModal = () => document.getElementById('editModal').style.display = 'block';
        window.closeModal = () => document.getElementById('editModal').style.display = 'none';

        window.onload = loadProfile;
    </script>
</body>
</html>
